<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Octokeen Play Store Release Checklist</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f1117;
      color: #e1e4e8;
      min-height: 100vh;
      padding: 32px 16px;
    }
    .container { max-width: 720px; margin: 0 auto; }
    header {
      text-align: center;
      margin-bottom: 40px;
    }
    header h1 {
      font-size: 28px;
      font-weight: 800;
      background: linear-gradient(135deg, #0D9488, #06b6d4);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 6px;
    }
    header p {
      color: #8b949e;
      font-size: 14px;
    }
    .progress-bar-wrapper {
      background: #1c1f26;
      border-radius: 12px;
      padding: 16px 20px;
      margin-bottom: 32px;
      border: 1px solid #2d333b;
    }
    .progress-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }
    .progress-header span {
      font-size: 13px;
      font-weight: 600;
      color: #8b949e;
    }
    .progress-header .count {
      color: #0D9488;
      font-weight: 700;
    }
    .progress-track {
      height: 8px;
      background: #2d333b;
      border-radius: 4px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #0D9488, #06b6d4);
      border-radius: 4px;
      transition: width 0.4s ease;
      width: 0%;
    }
    .section {
      margin-bottom: 28px;
    }
    .section-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 14px;
      padding-bottom: 8px;
      border-bottom: 1px solid #2d333b;
    }
    .section-number {
      width: 28px;
      height: 28px;
      border-radius: 8px;
      background: #1c1f26;
      border: 1px solid #2d333b;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 700;
      color: #0D9488;
      flex-shrink: 0;
    }
    .section-number.done {
      background: #0D9488;
      border-color: #0D9488;
      color: #fff;
    }
    .section-title {
      font-size: 16px;
      font-weight: 700;
      color: #e1e4e8;
    }
    .section-tag {
      font-size: 11px;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 6px;
      margin-left: auto;
      flex-shrink: 0;
    }
    .tag-done-by-claude { background: #0D948820; color: #0D9488; }
    .tag-you { background: #f59e0b20; color: #f59e0b; }
    .tag-interactive { background: #8b5cf620; color: #a78bfa; }
    .items { display: flex; flex-direction: column; gap: 4px; }
    .item {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 10px 14px;
      border-radius: 10px;
      background: #1c1f26;
      border: 1px solid #2d333b;
      cursor: pointer;
      transition: all 0.15s ease;
      user-select: none;
    }
    .item:hover { border-color: #3d444d; background: #22262e; }
    .item.checked { opacity: 0.5; border-color: #2d333b; }
    .item.checked .item-text { text-decoration: line-through; color: #6e7681; }
    .checkbox {
      width: 20px;
      height: 20px;
      border-radius: 6px;
      border: 2px solid #3d444d;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-top: 1px;
      transition: all 0.15s ease;
    }
    .item.checked .checkbox {
      background: #0D9488;
      border-color: #0D9488;
    }
    .checkmark {
      display: none;
      color: white;
      font-size: 12px;
      font-weight: 700;
    }
    .item.checked .checkmark { display: block; }
    .item-content { flex: 1; min-width: 0; }
    .item-text {
      font-size: 14px;
      font-weight: 500;
      color: #c9d1d9;
      line-height: 1.4;
    }
    .item-note {
      font-size: 12px;
      color: #6e7681;
      margin-top: 3px;
      line-height: 1.4;
    }
    .item-note code {
      background: #2d333b;
      padding: 1px 5px;
      border-radius: 4px;
      font-size: 11px;
      font-family: 'SF Mono', Monaco, Consolas, monospace;
      color: #8b949e;
    }
    .item-badge {
      font-size: 10px;
      font-weight: 700;
      padding: 2px 6px;
      border-radius: 4px;
      flex-shrink: 0;
      margin-top: 2px;
    }
    .badge-auto { background: #0D948830; color: #0D9488; }
    .badge-manual { background: #f59e0b30; color: #f59e0b; }
    .badge-blocker { background: #ef444430; color: #f87171; }
    .badge-claude { background: #0D948825; color: #2dd4bf; border: 1px solid #0D948840; }
    .badge-you-only { background: #f59e0b20; color: #fbbf24; border: 1px solid #f59e0b30; }
    .badge-done { background: #22c55e25; color: #4ade80; border: 1px solid #22c55e40; }
    .badge-time { background: #ef444425; color: #f87171; border: 1px solid #ef444440; animation: pulse-time 2s ease-in-out infinite; }
    @keyframes pulse-time { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }
    .item.pre-done { opacity: 0.45; }
    .item.pre-done .item-text { text-decoration: line-through; color: #6e7681; }
    .item.pre-done .checkbox { background: #22c55e; border-color: #22c55e; }
    .item.pre-done .checkmark { display: block; }
    footer {
      text-align: center;
      margin-top: 40px;
      padding-top: 20px;
      border-top: 1px solid #2d333b;
      color: #6e7681;
      font-size: 12px;
    }
    .reset-btn {
      display: inline-block;
      margin-top: 12px;
      padding: 6px 14px;
      background: #2d333b;
      border: 1px solid #3d444d;
      border-radius: 8px;
      color: #8b949e;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s ease;
    }
    .reset-btn:hover { background: #3d444d; color: #c9d1d9; }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>Octokeen Play Store Release</h1>
      <p>Complete each step in order. Progress is saved locally.</p>
    </header>

    <div style="display:flex;flex-wrap:wrap;gap:10px;justify-content:center;margin-bottom:20px">
      <span class="item-badge badge-done" style="font-size:11px;padding:3px 10px">Done</span>
      <span class="item-badge badge-claude" style="font-size:11px;padding:3px 10px">Ask Claude</span>
      <span class="item-badge badge-you-only" style="font-size:11px;padding:3px 10px">You only</span>
      <span class="item-badge badge-time" style="font-size:11px;padding:3px 10px;animation:none">Has lead time</span>
      <span class="item-badge badge-blocker" style="font-size:11px;padding:3px 10px">Blocker</span>
    </div>

    <div class="progress-bar-wrapper">
      <div class="progress-header">
        <span>Overall Progress</span>
        <span class="count" id="progress-count">0 / 0</span>
      </div>
      <div class="progress-track">
        <div class="progress-fill" id="progress-fill"></div>
      </div>
    </div>

    <div id="checklist"></div>

    <footer>
      Octokeen Play Store Release Plan
      <br>
      <button class="reset-btn" onclick="resetAll()">Reset All Progress</button>
    </footer>
  </div>

  <script>
    const STORAGE_KEY = 'octokeen-playstore-checklist';

    const sections = [
      {
        title: 'Web Changes',
        tag: 'Complete',
        tagClass: 'tag-done-by-claude',
        items: [
          { text: 'Service worker updated with offline caching', note: '<code>public/sw.js</code> - cache-first for assets, network-first for pages, offline fallback', who: 'done' },
          { text: 'Offline fallback page created', note: '<code>public/offline.html</code> - branded page shown when offline', who: 'done' },
          { text: 'Web manifest updated for TWA', note: '<code>public/manifest.json</code> - added orientation, categories, scope, extra icon sizes', who: 'done' },
          { text: 'Digital Asset Links route created', note: '<code>src/app/.well-known/assetlinks.json/route.ts</code> - reads fingerprint from env vars', who: 'done' },
          { text: 'Account deletion API created', note: '<code>src/app/api/user/delete-account/route.ts</code> - Google Play requires self-service deletion', who: 'done' },
          { text: 'Account deletion UI added to Settings', note: 'Settings > Danger Zone > Delete Account with 2-step confirmation', who: 'done' },
          { text: 'TWA manifest configured', note: '<code>android/twa-manifest.json</code> - targets API 36 (Android 16)', who: 'done' },
          { text: 'Android build artifacts gitignored', note: 'Keystores, APKs, AABs, Gradle files all excluded', who: 'done' },
        ]
      },
      {
        title: 'Deploy Web Changes',
        tag: 'Mixed',
        tagClass: 'tag-interactive',
        items: [
          { text: 'Commit and push all web changes', note: 'Ask Claude to commit, then push. The offline support, manifest, asset links, and account deletion must be live first', who: 'claude' },
          { text: 'Verify deployment is live', note: 'Check <code>octokeen.com/manifest.json</code> has the new fields (orientation, categories, scope)', who: 'you' },
          { text: 'Test offline fallback works', note: 'Open octokeen.com, go offline in DevTools > Network, refresh. Should show branded offline page', who: 'you' },
          { text: 'Test account deletion flow', note: 'Settings > Danger Zone > Delete Account. Test with a throwaway account', who: 'you' },
        ]
      },
      {
        title: 'Google Play Developer Account',
        tag: 'You Only',
        tagClass: 'tag-you',
        items: [
          { text: 'Create Google Play Developer account', note: '<a href="https://play.google.com/console" style="color:#0D9488">play.google.com/console</a> - $25 one-time registration fee', who: 'you', badge: 'blocker', time: 'Do this NOW' },
          { text: 'Complete developer identity verification', note: 'Google requires ID verification before you can publish. Can take 2-5 business days to process.', who: 'you', time: '2-5 days wait' },
          { text: 'Enroll in alternative billing program', note: '<a href="https://support.google.com/googleplay/android-developer/answer/16497028" style="color:#0D9488">Required</a> since you use Paddle for payments (web checkout within TWA is fine)', who: 'you' },
        ]
      },
      {
        title: 'Build Android App',
        tag: 'Mixed',
        tagClass: 'tag-interactive',
        items: [
          { text: 'Run Bubblewrap init (interactive)', note: 'Run <code>cd android && npx @bubblewrap/cli init --manifest https://octokeen.com/manifest.json</code><br>Say Yes to JDK + Android SDK downloads. Accept defaults. Remember keystore password!', who: 'you', badge: 'blocker' },
          { text: 'Save keystore password securely', note: 'The keystore + password are permanent. Losing either = cannot update the app. Store in a password manager.', who: 'you' },
          { text: 'Get SHA-256 signing fingerprint', note: 'After init, ask Claude to run: <code>keytool -list -v -keystore android.keystore</code>', who: 'claude' },
          { text: 'Add fingerprint to Vercel env vars', note: 'Set <code>ANDROID_SHA256_FINGERPRINT</code> and <code>ANDROID_PACKAGE_NAME=com.octokeen.app</code> in Vercel dashboard', who: 'you' },
          { text: 'Redeploy after adding env vars', note: 'The asset links route needs the fingerprint to serve the correct response', who: 'you' },
          { text: 'Verify asset links', note: 'Visit <code>octokeen.com/.well-known/assetlinks.json</code> and confirm your fingerprint appears', who: 'you' },
          { text: 'Build the AAB', note: 'Ask Claude to run: <code>npx @bubblewrap/cli build</code> - produces <code>app-release-bundle.aab</code>', who: 'claude' },
          { text: 'Test APK on a device or emulator', note: '<code>adb install app-release-signed.apk</code> or drag to emulator. Check: no URL bar, offline works, payments work', who: 'you' },
        ]
      },
      {
        title: 'Play Store Listing Assets',
        tag: 'Mixed',
        tagClass: 'tag-interactive',
        items: [
          { text: 'App icon: 512x512 PNG (no alpha)', note: 'You already have <code>icon-512.png</code>. Play Store requires 32-bit PNG with no transparency.', who: 'claude' },
          { text: 'Feature graphic: 1024x500 PNG', note: 'Banner image shown at top of store listing. Design it or use a tool like Canva.', who: 'you' },
          { text: 'Phone screenshots: at least 2', note: 'JPEG or PNG, 16:9 or 9:16. Take screenshots of: home screen, lesson, course map, profile.', who: 'you' },
          { text: 'Tablet screenshots: at least 1', note: '7-inch and/or 10-inch. Can use Android emulator with tablet resolution.', who: 'you' },
          { text: 'Short description (80 chars max)', note: 'Ask Claude to write this for you', who: 'claude' },
          { text: 'Full description (4000 chars max)', note: 'Ask Claude to write this for you. Covers: features, who it\'s for, key differentiators', who: 'claude' },
        ]
      },
      {
        title: 'Play Console Setup',
        tag: 'You Only',
        tagClass: 'tag-you',
        items: [
          { text: 'Create app in Play Console', note: 'App name: Octokeen, Default language: English, App type: App, Free/Paid: Free', who: 'you' },
          { text: 'Upload AAB to internal testing track first', note: 'Internal testing lets you verify before public release', who: 'you' },
          { text: 'Set app category: Education', note: 'Store presence > Main store listing > Category', who: 'you' },
          { text: 'Add privacy policy URL', note: '<code>https://octokeen.com/privacy</code>', who: 'you' },
          { text: 'Complete Data Safety form', note: 'Declare: email (account), name (optional), usage data (analytics). Mention Mixpanel, Sentry.', who: 'you' },
          { text: 'Complete Content Rating questionnaire', note: 'IARC rating. Education app with no violence/gambling = "Everyone"', who: 'you' },
          { text: 'Set target audience and content', note: 'Not primarily for children (avoid COPPA requirements). Target: 18+', who: 'you' },
          { text: 'Add account deletion instructions', note: 'Data Safety > account deletion URL: <code>https://octokeen.com/settings</code>', who: 'you' },
          { text: 'Complete App Access section', note: 'If reviewers need a test account to access content, provide one here', who: 'you' },
        ]
      },
      {
        title: 'Pre-Launch Testing',
        tag: 'You Only',
        tagClass: 'tag-you',
        items: [
          { text: 'Run Lighthouse audit on octokeen.com', note: 'Score must be 80%+ for TWA. Run: Chrome DevTools > Lighthouse > Mobile', who: 'you' },
          { text: 'Test TWA in internal testing track', note: 'Install from Play Console internal link. Verify: no URL bar, smooth navigation, back button works', who: 'you' },
          { text: 'Test Paddle payment flow in TWA', note: 'Tap upgrade, Paddle modal should appear inside the app seamlessly', who: 'you' },
          { text: 'Test push notifications', note: 'Enable notifications in settings, trigger a test push. Should work as native Android notification', who: 'you' },
          { text: 'Test offline behavior', note: 'Turn on airplane mode. App should show offline page, not crash', who: 'you' },
          { text: 'Test account deletion end-to-end', note: 'Create throwaway account, delete it from settings, verify signed out and data gone', who: 'you' },
        ]
      },
      {
        title: 'Submit for Review',
        tag: 'You Only',
        tagClass: 'tag-you',
        items: [
          { text: 'Promote from internal to production track', note: 'Play Console > Release > Production > Create new release', who: 'you' },
          { text: 'Set rollout percentage', note: 'Start with 20% staged rollout, then increase if no issues', who: 'you' },
          { text: 'Submit for review', note: 'First review typically takes 1-3 days. May take up to 7 days for new developer accounts.', who: 'you', time: '1-7 days wait' },
          { text: 'App is live on Google Play!', note: 'Share the Play Store link.', who: 'you' },
        ]
      }
    ];

    function getState() {
      try {
        return JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
      } catch { return {}; }
    }

    function setState(state) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }

    function getKey(si, ii) { return `s${si}_i${ii}`; }

    function render() {
      const state = getState();
      const container = document.getElementById('checklist');
      container.innerHTML = '';

      let total = 0;
      let checked = 0;

      sections.forEach((section, si) => {
        const sectionEl = document.createElement('div');
        sectionEl.className = 'section';

        const allDone = section.items.every((item, ii) => item.who === 'done' || state[getKey(si, ii)]);

        sectionEl.innerHTML = `
          <div class="section-header">
            <div class="section-number ${allDone ? 'done' : ''}">${allDone ? '&#10003;' : si + 1}</div>
            <div class="section-title">${section.title}</div>
            <div class="section-tag ${section.tagClass}">${section.tag}</div>
          </div>
          <div class="items"></div>
        `;

        const itemsEl = sectionEl.querySelector('.items');

        section.items.forEach((item, ii) => {
          total++;
          const key = getKey(si, ii);
          const isDone = item.who === 'done';
          const isChecked = isDone || !!state[key];
          if (isChecked) checked++;

          const itemEl = document.createElement('div');
          if (isDone) {
            itemEl.className = 'item pre-done';
          } else {
            itemEl.className = `item ${isChecked ? 'checked' : ''}`;
            itemEl.onclick = () => {
              const s = getState();
              s[key] = !s[key];
              setState(s);
              render();
            };
          }

          let badges = '';
          if (item.who === 'claude') badges += '<span class="item-badge badge-claude">Ask Claude</span>';
          else if (item.who === 'you') badges += '<span class="item-badge badge-you-only">You only</span>';
          else if (item.who === 'done') badges += '<span class="item-badge badge-done">Done</span>';
          if (item.badge === 'blocker') badges += '<span class="item-badge badge-blocker">BLOCKER</span>';
          if (item.time) badges += `<span class="item-badge badge-time">${item.time}</span>`;

          itemEl.innerHTML = `
            <div class="checkbox"><span class="checkmark">&#10003;</span></div>
            <div class="item-content">
              <div class="item-text">${item.text}</div>
              ${item.note ? `<div class="item-note">${item.note}</div>` : ''}
            </div>
            <div style="display:flex;flex-direction:column;gap:3px;align-items:flex-end">${badges}</div>
          `;

          itemsEl.appendChild(itemEl);
        });

        container.appendChild(sectionEl);
      });

      document.getElementById('progress-count').textContent = `${checked} / ${total}`;
      document.getElementById('progress-fill').style.width = `${total ? (checked / total * 100) : 0}%`;
    }

    function resetAll() {
      if (confirm('Reset all checklist progress?')) {
        localStorage.removeItem(STORAGE_KEY);
        render();
      }
    }

    render();
  </script>
</body>
</html>
