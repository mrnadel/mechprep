<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Animated Spring — MechPrep</title>
<style>
  body {
    margin: 0;
    background: #FAFAFA;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }
  .card {
    background: white;
    border-radius: 20px;
    box-shadow: 0 8px 30px rgba(0,0,0,0.08);
    padding: 40px;
    text-align: center;
  }
  h2 { color: #7B2FBE; margin-bottom: 8px; font-size: 20px; }
  p { color: #999; font-size: 14px; margin-bottom: 24px; }
  svg { display: block; margin: 0 auto; }
</style>
</head>
<body>
<div class="card">
  <h2>Spring-Mass System</h2>
  <p>Monochromatic animated SVG — purple family</p>

  <svg viewBox="0 0 200 300" width="240" height="360" fill="none">
    <!-- Wall (top) -->
    <rect x="60" y="10" width="80" height="12" rx="3" fill="#CE82FF" opacity="0.3"/>
    <line x1="65" y1="10" x2="60" y2="2" stroke="#CE82FF" stroke-width="2" opacity="0.25"/>
    <line x1="80" y1="10" x2="75" y2="2" stroke="#CE82FF" stroke-width="2" opacity="0.25"/>
    <line x1="95" y1="10" x2="90" y2="2" stroke="#CE82FF" stroke-width="2" opacity="0.25"/>
    <line x1="110" y1="10" x2="105" y2="2" stroke="#CE82FF" stroke-width="2" opacity="0.25"/>
    <line x1="125" y1="10" x2="120" y2="2" stroke="#CE82FF" stroke-width="2" opacity="0.25"/>
    <line x1="140" y1="10" x2="135" y2="2" stroke="#CE82FF" stroke-width="2" opacity="0.25"/>

    <!-- Attachment point -->
    <circle cx="100" cy="22" r="4" fill="#7B2FBE"/>

    <!-- Spring coils — animated group -->
    <g>
      <animateTransform attributeName="transform" type="translate"
        values="0,0; 0,30; 0,-10; 0,20; 0,0"
        dur="2s" repeatCount="indefinite" keyTimes="0;0.3;0.5;0.75;1"
        calcMode="spline" keySplines="0.4 0 0.2 1; 0.4 0 0.2 1; 0.4 0 0.2 1; 0.4 0 0.2 1"/>

      <!-- Spring path (zigzag) -->
      <polyline points="100,26 100,36 85,46 115,56 85,66 115,76 85,86 115,96 85,106 115,116 85,126 115,136 100,146 100,150"
        stroke="#CE82FF" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

      <!-- Mass block -->
      <rect x="72" y="150" width="56" height="44" rx="8" fill="#CE82FF" opacity="0.2"/>
      <rect x="72" y="150" width="56" height="44" rx="8" stroke="#7B2FBE" stroke-width="3" fill="none"/>

      <!-- "m" label on block -->
      <text x="100" y="178" text-anchor="middle" fill="#7B2FBE" font-size="20" font-weight="bold" font-family="serif" font-style="italic">m</text>

      <!-- Velocity arrow (appears during motion) -->
      <g opacity="0.6">
        <animateTransform attributeName="transform" type="translate"
          values="0,0; 0,30; 0,-10; 0,20; 0,0"
          dur="2s" repeatCount="indefinite" keyTimes="0;0.3;0.5;0.75;1"
          calcMode="spline" keySplines="0.4 0 0.2 1; 0.4 0 0.2 1; 0.4 0 0.2 1; 0.4 0 0.2 1"
          additive="sum"/>
        <!-- This arrow shows on the right of the mass -->
        <line x1="140" y1="172" x2="140" y2="195" stroke="#7B2FBE" stroke-width="2.5" stroke-linecap="round">
          <animate attributeName="y2" values="172;202;162;192;172" dur="2s" repeatCount="indefinite"
            keyTimes="0;0.3;0.5;0.75;1" calcMode="spline"
            keySplines="0.4 0 0.2 1; 0.4 0 0.2 1; 0.4 0 0.2 1; 0.4 0 0.2 1"/>
        </line>
        <text x="152" y="188" fill="#7B2FBE" font-size="14" font-weight="bold" font-style="italic" font-family="serif">v</text>
      </g>
    </g>

    <!-- Equilibrium line (dashed) -->
    <line x1="40" y1="172" x2="55" y2="172" stroke="#CE82FF" stroke-width="1.5" stroke-dasharray="4 3" opacity="0.4"/>
    <text x="38" y="176" text-anchor="end" fill="#CE82FF" font-size="10" opacity="0.5">eq</text>

    <!-- Spring constant label -->
    <text x="68" y="90" text-anchor="end" fill="#7B2FBE" font-size="13" font-weight="bold" font-style="italic" font-family="serif" opacity="0.5">k</text>

    <!-- Ground / reference -->
    <line x1="40" y1="245" x2="160" y2="245" stroke="#CE82FF" stroke-width="2" opacity="0.15"/>

    <!-- Displacement arrow (animated) -->
    <g>
      <line x1="160" y1="172" x2="160" y2="172" stroke="#E8B4FF" stroke-width="2" stroke-linecap="round">
        <animate attributeName="y2" values="172;202;162;192;172" dur="2s" repeatCount="indefinite"
          keyTimes="0;0.3;0.5;0.75;1" calcMode="spline"
          keySplines="0.4 0 0.2 1; 0.4 0 0.2 1; 0.4 0 0.2 1; 0.4 0 0.2 1"/>
      </line>
      <text x="170" y="192" fill="#CE82FF" font-size="13" font-weight="bold" font-style="italic" font-family="serif" opacity="0.6">x</text>
    </g>

    <!-- Formula at bottom -->
    <text x="100" y="270" text-anchor="middle" fill="#7B2FBE" font-size="14" font-weight="bold" font-family="serif" opacity="0.4">
      F = −kx
    </text>
  </svg>
</div>
</body>
</html>
