<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MechReady — FX Gallery (20 Full-Screen Effects)</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap');
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'Nunito',sans-serif;background:#0a0a0a;color:#fff;padding:40px 20px 80px;}
  h1{text-align:center;font-size:26px;font-weight:900;margin-bottom:4px;}
  .sub{text-align:center;font-size:12px;color:#555;margin-bottom:40px;}
  .g{display:flex;flex-wrap:wrap;justify-content:center;gap:32px;}
  .cw{display:flex;flex-direction:column;align-items:center;gap:10px;}
  .cl{font-size:11px;font-weight:700;color:#555;text-transform:uppercase;letter-spacing:1px;text-align:center;max-width:200px;}
  .sec{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:2.5px;color:#444;margin:56px 0 28px;text-align:center;}

  /* Phone frame */
  .ph{width:220px;height:440px;border-radius:28px;overflow:hidden;border:2px solid #2a2a2a;position:relative;box-shadow:0 16px 60px rgba(0,0,0,0.5);flex-shrink:0;background:#1a1a2e;}
  .fx{position:absolute;inset:0;overflow:hidden;}

  /* ═══════════════════════════ */
  /* FX 1: Rising Bubbles       */
  /* ═══════════════════════════ */
  .bubble{position:absolute;border-radius:50%;background:rgba(255,255,255,0.15);animation:rise var(--d,6s) var(--dl,0s) infinite ease-in-out;}
  @keyframes rise{0%{opacity:0;transform:translateY(100%) scale(0.5)}10%{opacity:0.7}80%{opacity:0.3}100%{opacity:0;transform:translateY(-120%) scale(1.1)}}

  /* FX 2: Confetti Rain */
  .confetti{position:absolute;width:8px;height:8px;border-radius:2px;animation:confetti-fall var(--d,3s) var(--dl,0s) infinite linear;}
  @keyframes confetti-fall{0%{opacity:1;transform:translateY(-20px) rotate(0deg)}100%{opacity:0.3;transform:translateY(460px) rotate(720deg)}}

  /* FX 3: Star Burst */
  .star{position:absolute;animation:star-pop var(--d,2s) var(--dl,0s) infinite ease-out;}
  .star::before{content:'★';font-size:var(--sz,16px);color:var(--c,#FFC800);}
  @keyframes star-pop{0%{opacity:0;transform:scale(0) rotate(0deg)}20%{opacity:1;transform:scale(1.2) rotate(30deg)}60%{opacity:0.8;transform:scale(0.9) rotate(60deg)}100%{opacity:0;transform:scale(0.5) rotate(90deg) translateY(-40px)}}

  /* FX 4: Floating Hearts */
  .heart{position:absolute;animation:heart-float var(--d,4s) var(--dl,0s) infinite ease-in-out;}
  .heart::before{content:'♥';font-size:var(--sz,18px);color:var(--c,#FF4B4B);}
  @keyframes heart-float{0%{opacity:0;transform:translateY(0) scale(0.3)}15%{opacity:0.9}50%{transform:translateY(-120px) translateX(var(--dx,15px)) scale(1)}100%{opacity:0;transform:translateY(-250px) translateX(calc(var(--dx)*2)) scale(0.6)}}

  /* FX 5: Sparkle Dust */
  .sparkle{position:absolute;width:var(--sz,4px);height:var(--sz,4px);border-radius:50%;background:var(--c,white);animation:sparkle-pop var(--d,1.5s) var(--dl,0s) infinite ease-out;}
  @keyframes sparkle-pop{0%{opacity:0;transform:scale(0)}30%{opacity:1;transform:scale(1)}100%{opacity:0;transform:scale(0) translate(var(--dx,10px),var(--dy,-10px))}}

  /* FX 6: Firework Burst */
  .fw-dot{position:absolute;width:4px;height:4px;border-radius:50%;animation:fw-burst var(--d,2s) var(--dl,0s) infinite ease-out;}
  @keyframes fw-burst{0%{opacity:0;transform:translate(0,0) scale(0)}10%{opacity:1;transform:translate(0,0) scale(1)}100%{opacity:0;transform:translate(var(--fx,50px),var(--fy,-50px)) scale(0.3)}}

  /* FX 7: Snow Fall */
  .snow{position:absolute;border-radius:50%;background:white;opacity:0.7;animation:snow-fall var(--d,5s) var(--dl,0s) infinite linear;}
  @keyframes snow-fall{0%{transform:translateY(-10px) translateX(0) rotate(0deg);opacity:0.8}50%{transform:translateY(220px) translateX(var(--dx,20px)) rotate(180deg);opacity:0.6}100%{transform:translateY(460px) translateX(0) rotate(360deg);opacity:0}}

  /* FX 8: Lightning Flash */
  .flash{position:absolute;inset:0;background:white;opacity:0;animation:flash-pop var(--d,4s) var(--dl,0s) infinite ease-out;}
  @keyframes flash-pop{0%{opacity:0}2%{opacity:0.6}4%{opacity:0}6%{opacity:0.3}8%{opacity:0}100%{opacity:0}}

  /* FX 9: Radial Pulse */
  .pulse-ring{position:absolute;border-radius:50%;border:2px solid var(--c,rgba(255,255,255,0.3));animation:pulse-expand var(--d,2s) var(--dl,0s) infinite ease-out;}
  @keyframes pulse-expand{0%{opacity:0.8;transform:scale(0)}100%{opacity:0;transform:scale(3)}}

  /* FX 10: Vertical Streaks */
  .streak{position:absolute;width:2px;background:linear-gradient(to bottom,transparent,var(--c,rgba(255,255,255,0.4)),transparent);animation:streak-down var(--d,1s) var(--dl,0s) infinite linear;}
  @keyframes streak-down{0%{opacity:0;transform:translateY(-100%)}50%{opacity:0.8}100%{opacity:0;transform:translateY(500px)}}

  /* FX 11: Swirl Orbs */
  .orb{position:absolute;border-radius:50%;filter:blur(2px);animation:orb-swirl var(--d,6s) var(--dl,0s) infinite ease-in-out;}
  @keyframes orb-swirl{0%{transform:translate(0,0) scale(0.8);opacity:0.4}25%{transform:translate(40px,-60px) scale(1.1);opacity:0.7}50%{transform:translate(-20px,-100px) scale(0.9);opacity:0.5}75%{transform:translate(-40px,-40px) scale(1);opacity:0.6}100%{transform:translate(0,0) scale(0.8);opacity:0.4}}

  /* FX 12: Diagonal Rain */
  .drain{position:absolute;width:2px;height:20px;border-radius:1px;background:var(--c,rgba(255,255,255,0.3));transform:rotate(20deg);animation:drain-fall var(--d,1.5s) var(--dl,0s) infinite linear;}
  @keyframes drain-fall{0%{opacity:0;transform:rotate(20deg) translate(-40px,-20px)}20%{opacity:0.6}100%{opacity:0;transform:rotate(20deg) translate(80px,500px)}}

  /* FX 13: Floating Emojis */
  .emo{position:absolute;animation:emo-rise var(--d,4s) var(--dl,0s) infinite ease-in-out;font-size:var(--sz,22px);}
  @keyframes emo-rise{0%{opacity:0;transform:translateY(20px) scale(0.5) rotate(-10deg)}15%{opacity:1}60%{opacity:0.8;transform:translateY(-200px) scale(1) rotate(10deg)}100%{opacity:0;transform:translateY(-350px) scale(0.7) rotate(20deg)}}

  /* FX 14: Glitch Lines */
  .glitch{position:absolute;left:0;right:0;height:2px;background:rgba(255,255,255,0.5);animation:glitch-flick var(--d,3s) var(--dl,0s) infinite steps(1);}
  @keyframes glitch-flick{0%{opacity:0;transform:translateX(0)}5%{opacity:0.8;transform:translateX(-5px)}10%{opacity:0;transform:translateX(3px)}15%{opacity:0.6;transform:translateX(-2px)}20%{opacity:0}100%{opacity:0}}

  /* FX 15: Bokeh */
  .bokeh{position:absolute;border-radius:50%;background:var(--c,rgba(255,255,255,0.1));animation:bokeh-drift var(--d,8s) var(--dl,0s) infinite ease-in-out;}
  @keyframes bokeh-drift{0%{transform:translate(0,0);opacity:0.1}33%{transform:translate(var(--dx,20px),var(--dy,-30px));opacity:0.3}66%{transform:translate(calc(var(--dx)*-1),calc(var(--dy)*-0.5));opacity:0.15}100%{transform:translate(0,0);opacity:0.1}}

  /* FX 16: Comet Trail */
  .comet{position:absolute;width:3px;height:3px;border-radius:50%;background:white;box-shadow:0 0 6px 2px rgba(255,255,255,0.4);animation:comet-fly var(--d,3s) var(--dl,0s) infinite ease-in;}
  @keyframes comet-fly{0%{opacity:0;transform:translate(-50px,500px)}30%{opacity:1}100%{opacity:0;transform:translate(300px,-100px)}}

  /* FX 17: Wave Bars */
  .wbar{position:absolute;bottom:0;width:4px;border-radius:2px;background:var(--c,rgba(255,255,255,0.3));animation:wbar-bounce var(--d,1.5s) var(--dl,0s) infinite ease-in-out alternate;}
  @keyframes wbar-bounce{0%{height:10px;opacity:0.3}100%{height:var(--h,80px);opacity:0.7}}

  /* FX 18: Pixel Grid */
  .pix{position:absolute;width:6px;height:6px;border-radius:1px;animation:pix-pop var(--d,2s) var(--dl,0s) infinite ease-out;}
  @keyframes pix-pop{0%{opacity:0;transform:scale(0)}20%{opacity:0.8;transform:scale(1)}50%{opacity:0.6}100%{opacity:0;transform:scale(0.3) translateY(-20px)}}

  /* FX 19: DNA Helix */
  .dna{position:absolute;width:6px;height:6px;border-radius:50%;animation:dna-spin var(--d,3s) var(--dl,0s) infinite linear;}
  @keyframes dna-spin{0%{transform:translate(calc(20px * cos(0)),0);opacity:0.3}25%{transform:translate(calc(-20px),calc(-110px));opacity:0.8}50%{transform:translate(20px,calc(-220px));opacity:0.3}75%{transform:translate(-20px,calc(-330px));opacity:0.8}100%{transform:translate(20px,calc(-440px));opacity:0}}

  /* FX 20: Smoke Wisps */
  .smoke{position:absolute;border-radius:50%;background:radial-gradient(circle,var(--c,rgba(255,255,255,0.15)),transparent);animation:smoke-rise var(--d,6s) var(--dl,0s) infinite ease-out;}
  @keyframes smoke-rise{0%{opacity:0;transform:translateY(0) scale(0.5)}20%{opacity:0.4}60%{transform:translateY(-150px) translateX(var(--dx,30px)) scale(2);opacity:0.2}100%{opacity:0;transform:translateY(-300px) translateX(calc(var(--dx)*2)) scale(3)}}
</style>
</head>
<body>

<h1>fx gallery</h1>
<p class="sub">20 full-screen effects for MechReady modals and celebrations. Click to preview full-screen.</p>

<div class="sec">particle effects</div>
<div class="g" id="gallery"></div>

<div id="fullscreen" style="display:none;position:fixed;inset:0;z-index:100;cursor:pointer;" onclick="this.style.display='none'">
  <div style="position:absolute;top:20px;right:20px;z-index:101;background:rgba(0,0,0,0.5);color:#fff;padding:8px 16px;border-radius:8px;font-size:12px;font-weight:700;">click anywhere to close</div>
</div>

<script>
const effects = [

// ── 1. Rising Bubbles (celebration) ──
{
  name: 'Rising Bubbles',
  bg: '#1a1a2e',
  gen(el) {
    for(let i=0;i<25;i++){
      const b=document.createElement('div');
      b.className='bubble';
      const s=4+Math.random()*14;
      Object.assign(b.style,{width:s+'px',height:s+'px',left:Math.random()*100+'%',bottom:'-20px','--d':(4+Math.random()*5)+'s','--dl':Math.random()*4+'s',background:`rgba(255,255,255,${0.08+Math.random()*0.15})`});
      el.appendChild(b);
    }
  }
},

// ── 2. Confetti Rain (victory) ──
{
  name: 'Confetti Rain',
  bg: '#1a1a2e',
  gen(el) {
    const colors=['#FF4B4B','#FFC800','#58CC02','#1CB0F6','#CE82FF','#FF9600','#FFAADE'];
    for(let i=0;i<40;i++){
      const c=document.createElement('div');
      c.className='confetti';
      const w=4+Math.random()*8,h=4+Math.random()*6;
      Object.assign(c.style,{width:w+'px',height:h+'px',left:Math.random()*100+'%',top:'-10px',background:colors[i%7],'--d':(2+Math.random()*3)+'s','--dl':Math.random()*3+'s',borderRadius:Math.random()>0.5?'50%':'2px'});
      el.appendChild(c);
    }
  }
},

// ── 3. Gold Stars Burst ──
{
  name: 'Gold Star Burst',
  bg: 'linear-gradient(180deg,#1a1a2e,#2d1b4e)',
  gen(el) {
    for(let i=0;i<15;i++){
      const s=document.createElement('div');
      s.className='star';
      Object.assign(s.style,{left:Math.random()*90+'%',top:10+Math.random()*80+'%','--d':(1.5+Math.random()*2)+'s','--dl':Math.random()*3+'s','--sz':(12+Math.random()*16)+'px','--c':['#FFC800','#FFB100','#FBE56D'][i%3]});
      el.appendChild(s);
    }
  }
},

// ── 4. Floating Hearts ──
{
  name: 'Floating Hearts',
  bg: 'linear-gradient(180deg,#2d1020,#1a1a2e)',
  gen(el) {
    for(let i=0;i<12;i++){
      const h=document.createElement('div');
      h.className='heart';
      Object.assign(h.style,{left:5+Math.random()*90+'%',bottom:'10%','--d':(3+Math.random()*3)+'s','--dl':Math.random()*4+'s','--sz':(14+Math.random()*14)+'px','--c':['#FF4B4B','#FF7878','#FFAADE','#FFB2B2'][i%4],'--dx':(Math.random()*40-20)+'px'});
      el.appendChild(h);
    }
  }
},

// ── 5. Sparkle Dust (subtle) ──
{
  name: 'Sparkle Dust',
  bg: '#1a1a2e',
  gen(el) {
    for(let i=0;i<30;i++){
      const s=document.createElement('div');
      s.className='sparkle';
      Object.assign(s.style,{left:Math.random()*100+'%',top:Math.random()*100+'%','--d':(1+Math.random()*2)+'s','--dl':Math.random()*3+'s','--sz':(2+Math.random()*5)+'px','--c':['white','#FFC800','#84D8FF','#FFAADE'][i%4],'--dx':(Math.random()*30-15)+'px','--dy':(Math.random()*-30)+'px'});
      el.appendChild(s);
    }
  }
},

// ── 6. Firework Burst (center) ──
{
  name: 'Firework Burst',
  bg: '#0a0a1a',
  gen(el) {
    const colors=['#FF4B4B','#FFC800','#58CC02','#1CB0F6','#CE82FF','#FF9600'];
    for(let burst=0;burst<3;burst++){
      const cx=30+burst*20,cy=30+Math.random()*30;
      for(let i=0;i<12;i++){
        const d=document.createElement('div');
        d.className='fw-dot';
        const angle=(i/12)*Math.PI*2;
        const dist=40+Math.random()*40;
        Object.assign(d.style,{left:cx+'%',top:cy+'%',background:colors[(burst*4+i)%6],'--d':(1.5+Math.random())+'s','--dl':(burst*1.2+Math.random()*0.5)+'s','--fx':Math.cos(angle)*dist+'px','--fy':Math.sin(angle)*dist+'px',width:'5px',height:'5px'});
        el.appendChild(d);
      }
    }
  }
},

// ── 7. Gentle Snow ──
{
  name: 'Gentle Snow',
  bg: 'linear-gradient(180deg,#1a2a3a,#0a1520)',
  gen(el) {
    for(let i=0;i<30;i++){
      const s=document.createElement('div');
      s.className='snow';
      const sz=2+Math.random()*4;
      Object.assign(s.style,{width:sz+'px',height:sz+'px',left:Math.random()*100+'%',top:'-5%','--d':(3+Math.random()*4)+'s','--dl':Math.random()*5+'s','--dx':(Math.random()*40-20)+'px'});
      el.appendChild(s);
    }
  }
},

// ── 8. Lightning Flash ──
{
  name: 'Lightning Flash',
  bg: '#0a0a1a',
  gen(el) {
    for(let i=0;i<3;i++){
      const f=document.createElement('div');
      f.className='flash';
      Object.assign(f.style,{'--d':(3+i*2)+'s','--dl':i*1.3+'s'});
      el.appendChild(f);
    }
  }
},

// ── 9. Radial Pulse Rings ──
{
  name: 'Radial Pulse',
  bg: '#1a1a2e',
  gen(el) {
    for(let i=0;i<5;i++){
      const r=document.createElement('div');
      r.className='pulse-ring';
      const sz=60+Math.random()*40;
      Object.assign(r.style,{width:sz+'px',height:sz+'px',left:'calc(50% - '+sz/2+'px)',top:'calc(45% - '+sz/2+'px)','--d':(1.5+Math.random()*1.5)+'s','--dl':i*0.5+'s','--c':['rgba(99,102,241,0.4)','rgba(168,85,247,0.3)','rgba(236,72,153,0.3)','rgba(6,182,212,0.3)','rgba(255,200,0,0.3)'][i]});
      el.appendChild(r);
    }
  }
},

// ── 10. Speed Streaks ──
{
  name: 'Speed Streaks',
  bg: 'linear-gradient(180deg,#1a1040,#0a0a1a)',
  gen(el) {
    for(let i=0;i<12;i++){
      const s=document.createElement('div');
      s.className='streak';
      const h=40+Math.random()*100;
      Object.assign(s.style,{left:Math.random()*100+'%',top:'-20%',height:h+'px','--d':(0.6+Math.random()*0.8)+'s','--dl':Math.random()*2+'s','--c':['rgba(99,102,241,0.4)','rgba(168,85,247,0.4)','rgba(255,200,0,0.3)'][i%3]});
      el.appendChild(s);
    }
  }
},

// ── 11. Swirl Orbs (ambient) ──
{
  name: 'Swirl Orbs',
  bg: '#1a1a2e',
  gen(el) {
    const colors=['rgba(99,102,241,0.3)','rgba(206,130,255,0.25)','rgba(255,170,222,0.2)','rgba(28,176,246,0.25)','rgba(255,200,0,0.2)'];
    for(let i=0;i<8;i++){
      const o=document.createElement('div');
      o.className='orb';
      const sz=30+Math.random()*50;
      Object.assign(o.style,{width:sz+'px',height:sz+'px',left:10+Math.random()*80+'%',top:10+Math.random()*80+'%',background:colors[i%5],'--d':(5+Math.random()*4)+'s','--dl':Math.random()*3+'s'});
      el.appendChild(o);
    }
  }
},

// ── 12. Diagonal Rain ──
{
  name: 'Diagonal Rain',
  bg: 'linear-gradient(180deg,#102030,#0a1018)',
  gen(el) {
    for(let i=0;i<20;i++){
      const d=document.createElement('div');
      d.className='drain';
      Object.assign(d.style,{left:Math.random()*120-10+'%',top:'-5%','--d':(1+Math.random()*1.5)+'s','--dl':Math.random()*3+'s','--c':'rgba(130,216,255,'+(0.2+Math.random()*0.2)+')'});
      el.appendChild(d);
    }
  }
},

// ── 13. Emoji Party ──
{
  name: 'Emoji Party',
  bg: '#1a1a2e',
  gen(el) {
    const emojis=['🎉','🎊','⭐','🔥','💪','🏆','💎','⚡','🚀','✨'];
    for(let i=0;i<14;i++){
      const e=document.createElement('div');
      e.className='emo';
      e.textContent=emojis[i%emojis.length];
      Object.assign(e.style,{left:5+Math.random()*90+'%',bottom:'5%','--d':(3+Math.random()*3)+'s','--dl':Math.random()*4+'s','--sz':(16+Math.random()*14)+'px'});
      el.appendChild(e);
    }
  }
},

// ── 14. Glitch Lines (error) ──
{
  name: 'Glitch Lines',
  bg: '#0a0a0a',
  gen(el) {
    for(let i=0;i<8;i++){
      const g=document.createElement('div');
      g.className='glitch';
      Object.assign(g.style,{top:Math.random()*100+'%',height:(1+Math.random()*3)+'px','--d':(2+Math.random()*3)+'s','--dl':Math.random()*4+'s',background:'rgba(255,75,75,'+(0.3+Math.random()*0.4)+')'});
      el.appendChild(g);
    }
  }
},

// ── 15. Bokeh Lights ──
{
  name: 'Bokeh Lights',
  bg: 'linear-gradient(135deg,#1a1030,#0a1520)',
  gen(el) {
    const colors=['rgba(255,200,0,0.12)','rgba(206,130,255,0.1)','rgba(28,176,246,0.1)','rgba(255,150,0,0.1)','rgba(88,204,2,0.1)'];
    for(let i=0;i<10;i++){
      const b=document.createElement('div');
      b.className='bokeh';
      const sz=40+Math.random()*80;
      Object.assign(b.style,{width:sz+'px',height:sz+'px',left:Math.random()*100+'%',top:Math.random()*100+'%','--c':colors[i%5],'--d':(6+Math.random()*6)+'s','--dl':Math.random()*5+'s','--dx':(Math.random()*50-25)+'px','--dy':(Math.random()*50-25)+'px',background:colors[i%5]});
      el.appendChild(b);
    }
  }
},

// ── 16. Comet Trails ──
{
  name: 'Comet Trails',
  bg: '#080818',
  gen(el) {
    for(let i=0;i<6;i++){
      const c=document.createElement('div');
      c.className='comet';
      Object.assign(c.style,{left:'-5%',bottom:Math.random()*100+'%','--d':(2+Math.random()*2)+'s','--dl':i*0.8+'s',background:['#FFC800','white','#84D8FF'][i%3]});
      el.appendChild(c);
    }
  }
},

// ── 17. Audio Wave Bars ──
{
  name: 'Audio Wave Bars',
  bg: 'linear-gradient(180deg,#1a1040,#0a0a1a)',
  gen(el) {
    for(let i=0;i<20;i++){
      const w=document.createElement('div');
      w.className='wbar';
      Object.assign(w.style,{left:(5+i*4.5)+'%',bottom:'20%','--d':(0.8+Math.random()*1)+'s','--dl':i*0.08+'s','--h':(30+Math.random()*80)+'px','--c':['rgba(99,102,241,0.5)','rgba(168,85,247,0.4)','rgba(206,130,255,0.5)'][i%3]});
      el.appendChild(w);
    }
  }
},

// ── 18. Pixel Grid Pop ──
{
  name: 'Pixel Grid Pop',
  bg: '#1a1a2e',
  gen(el) {
    const colors=['#58CC02','#1CB0F6','#FFC800','#FF4B4B','#CE82FF','#FF9600'];
    for(let r=0;r<8;r++){
      for(let c=0;c<6;c++){
        if(Math.random()>0.5) continue;
        const p=document.createElement('div');
        p.className='pix';
        Object.assign(p.style,{left:(10+c*15)+'%',top:(10+r*11)+'%','--d':(1.5+Math.random()*1.5)+'s','--dl':Math.random()*3+'s',background:colors[(r+c)%6]});
        el.appendChild(p);
      }
    }
  }
},

// ── 19. DNA Helix ──
{
  name: 'DNA Helix',
  bg: 'linear-gradient(180deg,#0a1520,#1a1a2e)',
  gen(el) {
    for(let i=0;i<16;i++){
      const d=document.createElement('div');
      d.className='dna';
      const isLeft=i%2===0;
      Object.assign(d.style,{left:isLeft?'35%':'55%',bottom:'-5%',background:isLeft?'#1CB0F6':'#CE82FF','--d':(2.5+Math.random())+'s','--dl':i*0.3+'s'});
      el.appendChild(d);
    }
  }
},

// ── 20. Smoke Wisps ──
{
  name: 'Smoke Wisps',
  bg: 'linear-gradient(180deg,#1a1020,#0a0a0a)',
  gen(el) {
    for(let i=0;i<8;i++){
      const s=document.createElement('div');
      s.className='smoke';
      const sz=40+Math.random()*60;
      Object.assign(s.style,{width:sz+'px',height:sz+'px',left:10+Math.random()*80+'%',bottom:'10%','--d':(4+Math.random()*4)+'s','--dl':Math.random()*5+'s','--dx':(Math.random()*60-30)+'px','--c':['rgba(206,130,255,0.12)','rgba(255,150,0,0.1)','rgba(28,176,246,0.1)','rgba(255,200,0,0.1)'][i%4]});
      el.appendChild(s);
    }
  }
},

];

// Render gallery
const gallery=document.getElementById('gallery');
const fullscreen=document.getElementById('fullscreen');

effects.forEach((fx,idx)=>{
  const wrap=document.createElement('div');
  wrap.className='cw';

  const phone=document.createElement('div');
  phone.className='ph';
  phone.style.cursor='pointer';
  phone.title='Click for fullscreen';

  const fxEl=document.createElement('div');
  fxEl.className='fx';
  fxEl.style.background=fx.bg;
  fx.gen(fxEl);
  phone.appendChild(fxEl);

  phone.addEventListener('click',()=>{
    fullscreen.style.display='block';
    fullscreen.style.background=fx.bg;
    // Clear old
    while(fullscreen.childElementCount>1) fullscreen.removeChild(fullscreen.lastChild);
    const fsEl=document.createElement('div');
    fsEl.style.cssText='position:absolute;inset:0;overflow:hidden;';
    fx.gen(fsEl);
    fullscreen.appendChild(fsEl);
  });

  const label=document.createElement('div');
  label.className='cl';
  label.textContent=`${idx+1}. ${fx.name}`;

  wrap.appendChild(phone);
  wrap.appendChild(label);
  gallery.appendChild(wrap);
});
</script>
</body>
</html>
