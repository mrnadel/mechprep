<!DOCTYPE html>
<html><head><title>League Badge Preview</title>
<style>
body { background: #F7F7F7; font-family: Nunito, sans-serif; display: flex; flex-direction: column; align-items: center; padding: 40px; gap: 24px; }
h1 { color: #4B4B4B; font-size: 22px; font-weight: 800; }
.row { display: flex; gap: 32px; flex-wrap: wrap; justify-content: center; align-items: end; }
.item { text-align: center; }
.item p { color: #777; font-size: 13px; font-weight: 700; margin-top: 8px; }
.item img { background: repeating-conic-gradient(#eee 0% 25%, transparent 0% 50%) 50% / 16px 16px; border-radius: 8px; }
</style></head><body>
<h1>league badges — cropped from source</h1>
<div class="row">
  <div class="item"><img src="/badges/league-bronze.png" width="200"><p>bronze (256px)</p></div>
  <div class="item"><img src="/badges/league-silver.png" width="200"><p>silver (256px)</p></div>
  <div class="item"><img src="/badges/league-gold.png" width="200"><p>gold (256px)</p></div>
  <div class="item"><img src="/badges/league-platinum.png" width="200"><p>platinum (256px)</p></div>
  <div class="item"><img src="/badges/league-masters.png" width="200"><p>masters (256px)</p></div>
</div>
<h2 style="color:#777;font-size:16px;font-weight:700;margin-top:32px;">small versions (128px source, shown at 64px)</h2>
<div class="row">
  <div class="item"><img src="/badges/league-bronze-sm.png" width="64"><p>bronze-sm</p></div>
  <div class="item"><img src="/badges/league-silver-sm.png" width="64"><p>silver-sm</p></div>
  <div class="item"><img src="/badges/league-gold-sm.png" width="64"><p>gold-sm</p></div>
  <div class="item"><img src="/badges/league-platinum-sm.png" width="64"><p>platinum-sm</p></div>
  <div class="item"><img src="/badges/league-masters-sm.png" width="64"><p>masters-sm</p></div>
</div>
</body></html>
