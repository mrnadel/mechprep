<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MechReady SVG Icon Library</title>
<style>
  :root {
    --bg: #0f0f14;
    --card: #1a1a24;
    --card-hover: #24243a;
    --border: #2a2a3a;
    --text: #e4e4ed;
    --text-dim: #8888a0;
    --accent: #58CC02;
    --accent2: #1CB0F6;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Nunito', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
  }
  .header {
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
    border-bottom: 1px solid var(--border);
    padding: 24px 32px;
    position: sticky; top: 0; z-index: 100;
  }
  .header h1 { font-size: 22px; font-weight: 800; }
  .header h1 span { color: var(--accent); }
  .header-row { display: flex; align-items: center; gap: 16px; margin-top: 12px; flex-wrap: wrap; }
  .search {
    flex: 1; min-width: 200px;
    padding: 8px 14px; border-radius: 8px;
    border: 1px solid var(--border); background: var(--bg);
    color: var(--text); font-size: 14px; outline: none;
  }
  .search:focus { border-color: var(--accent); }
  .size-control { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--text-dim); }
  .size-control input { width: 100px; accent-color: var(--accent); }
  .stats { font-size: 13px; color: var(--text-dim); }
  .cat-nav {
    display: flex; gap: 6px; padding: 12px 32px;
    border-bottom: 1px solid var(--border);
    overflow-x: auto; background: var(--bg);
    position: sticky; top: 90px; z-index: 99;
  }
  .cat-btn {
    padding: 6px 14px; border-radius: 20px;
    border: 1px solid var(--border); background: var(--card);
    color: var(--text-dim); font-size: 12px; font-weight: 700;
    cursor: pointer; white-space: nowrap; transition: all .15s;
  }
  .cat-btn:hover { border-color: var(--accent); color: var(--text); }
  .cat-btn.active { background: var(--accent); border-color: var(--accent); color: white; }
  .gallery { padding: 24px 32px; }
  .section-title {
    font-size: 16px; font-weight: 800;
    margin: 24px 0 12px; padding-bottom: 8px;
    border-bottom: 2px solid var(--border);
    text-transform: uppercase; letter-spacing: 1px;
  }
  .section-title span { color: var(--accent); font-weight: 400; font-size: 13px; margin-left: 8px; text-transform: none; letter-spacing: 0; }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
    gap: 12px;
  }
  .icon-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px 8px 10px;
    display: flex; flex-direction: column; align-items: center;
    gap: 8px; cursor: pointer; transition: all .15s;
    position: relative;
  }
  .icon-card:hover { background: var(--card-hover); border-color: var(--accent); transform: translateY(-2px); }
  .icon-name {
    font-size: 10px; color: var(--text-dim);
    text-align: center; word-break: break-all;
    line-height: 1.3; max-width: 100%;
  }
  .copied {
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    background: var(--accent); color: white;
    padding: 4px 12px; border-radius: 6px;
    font-size: 12px; font-weight: 700;
    pointer-events: none; animation: fadeOut 1s forwards;
  }
  @keyframes fadeOut { 0%{opacity:1} 70%{opacity:1} 100%{opacity:0} }
</style>
</head>
<body>

<div class="header">
  <h1><span>MechReady</span> SVG Icon Library <small style="font-size:12px;color:var(--text-dim);font-weight:400">(Duolingo Shape Language)</small></h1>
  <div class="header-row">
    <input class="search" type="text" placeholder="Search icons..." id="search">
    <div class="size-control">
      <label>Size:</label>
      <input type="range" min="24" max="128" value="64" id="sizeSlider">
      <span id="sizeLabel">64px</span>
    </div>
    <div class="stats" id="stats"></div>
  </div>
</div>
<div class="cat-nav" id="catNav"></div>
<div class="gallery" id="gallery"></div>

<script>
// ═══════════════════════════════════════════════════════════════
// MechReady SVG Library v2 — Duolingo Shape Language
// No gradients. No enclosing shapes. Flat fills. Eel outlines.
// Rounded rectangles, circles, rounded triangles ONLY.
// ═══════════════════════════════════════════════════════════════

const MechIcons = (() => {

// ── Duolingo Color Palette ──
const C = {
  // Greens
  owl:       '#58CC02', treeFrog:  '#58A700', mask:      '#89E219',
  turtle:    '#A5ED6E', seaSponge: '#D7FFB8',
  // Blues
  macaw:     '#1CB0F6', whale:     '#1899D6', humpback:  '#2B70C9',
  narwhal:   '#1453A3', blueJay:   '#84D8FF', moonJelly: '#7AF0F2',
  beluga:    '#BBF2FF', iguana:    '#DDF4FF', anchovy:   '#D2E4E8',
  // Reds/Pinks
  cardinal:  '#FF4B4B', fireAnt:   '#EA2B2B', crab:      '#FF7878',
  flamingo:  '#FFB2B2', walkFish:  '#FFDFE0', starfish:  '#FFAADE',
  // Yellows/Oranges
  bee:       '#FFC800', lion:      '#FFB100', fox:       '#FF9600',
  duck:      '#FBE56D', canary:    '#FFF5D3', cheetah:   '#FFCE8E',
  camel:     '#E7A601', guineaPig: '#CD7900', monkey:    '#E5A259',
  grizzly:   '#A56644',
  // Purples
  beetle:    '#CE82FF', betta:     '#9069CD', butterfly: '#6F4EA1',
  // Neutrals
  eel:       '#4B4B4B', polar:     '#F7F7F7',

// Stroke shorthand — all icons use Eel outline
const S = `stroke="${C.eel}" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"`;
const S2 = `stroke="${C.eel}" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"`;

// Level tier color
function lvlC(n) {
  if (n <= 5) return C.anchovy;
  if (n <= 10) return C.owl;
  if (n <= 15) return C.macaw;
  if (n <= 20) return C.beetle;
  if (n <= 25) return C.bee;
  return C.cardinal;
}
function lvlD(n) {
  if (n <= 5) return C.humpback;
  if (n <= 10) return C.treeFrog;
  if (n <= 15) return C.narwhal;
  if (n <= 20) return C.butterfly;
  if (n <= 25) return C.camel;
  return C.fireAnt;
}

const icons = {};

// ════════════════════════════
// TOPICS (11) — standalone object shapes
// ════════════════════════════

    <line x1="16" y1="8" x2="16" y2="14" stroke="${C.cardinal}" stroke-width="2" stroke-linecap="round"/>
    <polygon points="16,15 13,11 19,11" fill="${C.cardinal}"/>

function shield(fill, fill2, emblem) { return `
  <g data-part="shadow"><rect x="14" y="54" width="36" height="6" rx="3" fill="${C.eel}" opacity="0.1"/></g>
  <g data-part="body">

  </g>
  <g data-part="detail">${emblem}</g>
  <g data-part="highlight"><circle cx="22" cy="18" r="3" fill="${C.polar}" opacity="0.25"/></g>
`; }

const levelNames = [
  'Apprentice','Shop Hand','Drafter','Junior Tech','Lab Assistant',
  'Design Intern','Associate Eng','Project Eng','Stress Analyst','Thermal Spec',
  'Design Lead','Manuf Eng','Reliability Eng','Systems Eng','Senior Eng',
  'Materials Spec','Tech Lead','Principal Eng','R&D Innovator','Eng Manager',
  'Staff Eng','Domain Expert','Distinguished Eng','Chief Eng','Eng Fellow',
  'Tech Director','VP Eng','CTO','Eng Legend','Grandmaster'
];

for (let i = 0; i < 30; i++) {
  const n = i + 1;
  icons[`level-${n}`] = {
    category: 'Levels',
    label: `Lv${n} ${levelNames[i]}`,
    draw() {
      const c = lvlC(n), d = lvlD(n);
      let svg = lvlSym[i]
        .replace(/\$C/g, c).replace(/\$D/g, d)
        .replace(/\$S2/g, S2).replace(/\$S/g, S);
      return `
        <g data-part="shadow"><rect x="14" y="54" width="36" height="6" rx="3" fill="${C.eel}" opacity="0.1"/></g>
        <g data-part="body">${svg}</g>
        <g data-part="badge">
          <circle cx="52" cy="52" r="8" fill="${C.polar}" ${S}/>
          <text x="52" y="56" text-anchor="middle" font-size="9" font-weight="bold" fill="${C.eel}" font-family="system-ui">${n}</text>
        </g>
        <g data-part="highlight"><circle cx="20" cy="14" r="2" fill="${C.polar}" opacity="0.3"/></g>`;
    }
  };
}

// ═══════════════════════════
// PUBLIC API
// ═══════════════════════════

function render(name, size = 64) {
  const icon = icons[name];
  if (!icon) return `<svg width="${size}" height="${size}" viewBox="0 0 64 64"><text x="32" y="34" text-anchor="middle" font-size="8" fill="#888">?</text></svg>`;
  return `<svg xmlns="http://www.w3.org/2000/svg" width="${size}" height="${size}" viewBox="0 0 64 64" fill="none" stroke-linecap="round" stroke-linejoin="round">${icon.draw()}</svg>`;
}

function getAll() { return icons; }
function getCategory(cat) { return Object.fromEntries(Object.entries(icons).filter(([,v]) => v.category === cat)); }
function getCategories() { return [...new Set(Object.values(icons).map(i => i.category))]; }

return { render, getAll, getCategory, getCategories, icons, colors: C };
})();


// ═══════════════════════════
// GALLERY UI
// ═══════════════════════════
(function() {
  const gallery = document.getElementById('gallery');
  const search = document.getElementById('search');
  const sizeSlider = document.getElementById('sizeSlider');
  const sizeLabel = document.getElementById('sizeLabel');
  const catNav = document.getElementById('catNav');
  const stats = document.getElementById('stats');
  let currentSize = 64, currentCat = 'All', searchQuery = '';

  function buildCatNav() {
    const cats = ['All', ...MechIcons.getCategories()];
    catNav.innerHTML = cats.map(c =>
      `<button class="cat-btn ${c === currentCat ? 'active' : ''}" data-cat="${c}">${c} (${c === 'All' ? Object.keys(MechIcons.getAll()).length : Object.keys(MechIcons.getCategory(c)).length})</button>`
    ).join('');
    catNav.querySelectorAll('.cat-btn').forEach(btn => {
      btn.onclick = () => { currentCat = btn.dataset.cat; buildCatNav(); renderGallery(); };
    });
  }

  function renderGallery() {
    const all = MechIcons.getAll();
    const cats = MechIcons.getCategories();
    let html = '', total = 0;
    cats.forEach(cat => {
      if (currentCat !== 'All' && currentCat !== cat) return;
      const entries = Object.entries(all).filter(([k, v]) => {
        if (v.category !== cat) return false;
        if (searchQuery && !k.includes(searchQuery) && !v.label.toLowerCase().includes(searchQuery)) return false;
        return true;
      });
      if (!entries.length) return;
      total += entries.length;
      html += `<div class="section-title">${cat} <span>${entries.length} icons</span></div><div class="grid">`;
      entries.forEach(([key]) => {
        html += `<div class="icon-card" data-key="${key}" title="${key}">${MechIcons.render(key, currentSize)}<div class="icon-name">${key}</div></div>`;
      });
      html += `</div>`;
    });
    gallery.innerHTML = html;
    stats.textContent = `${total} icons`;
    gallery.querySelectorAll('.icon-card').forEach(card => {
      card.onclick = () => {
        navigator.clipboard.writeText(MechIcons.render(card.dataset.key, 64)).then(() => {
          const el = document.createElement('div'); el.className = 'copied'; el.textContent = 'Copied!';
          card.appendChild(el); setTimeout(() => el.remove(), 1000);
        });
      };
    });
  }

  sizeSlider.oninput = () => { currentSize = +sizeSlider.value; sizeLabel.textContent = currentSize + 'px'; renderGallery(); };
  search.oninput = () => { searchQuery = search.value.toLowerCase().trim(); renderGallery(); };
  buildCatNav();
  renderGallery();
})();
</script>
