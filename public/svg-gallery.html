<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MechReady SVG Icon Library</title>
<style>
  :root {
    --bg: #0f0f14;
    --card: #1a1a24;
    --card-hover: #24243a;
    --border: #2a2a3a;
    --text: #e4e4ed;
    --text-dim: #8888a0;
    --accent: #6366f1;
    --accent-dim: #4338ca;
    --success: #58cc02;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Nunito', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
    padding: 0;
  }
  /* ── Header ── */
  .header {
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
    border-bottom: 1px solid var(--border);
    padding: 24px 32px;
    position: sticky; top: 0; z-index: 100;
  }
  .header h1 { font-size: 22px; font-weight: 800; color: var(--text); }
  .header h1 span { color: var(--accent); }
  .header-row { display: flex; align-items: center; gap: 16px; margin-top: 12px; flex-wrap: wrap; }
  .search {
    flex: 1; min-width: 200px;
    padding: 8px 14px; border-radius: 8px;
    border: 1px solid var(--border); background: var(--bg);
    color: var(--text); font-size: 14px; outline: none;
  }
  .search:focus { border-color: var(--accent); }
  .size-control { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--text-dim); }
  .size-control input { width: 100px; accent-color: var(--accent); }
  .stats { font-size: 13px; color: var(--text-dim); }
  /* ── Category Nav ── */
  .cat-nav {
    display: flex; gap: 6px; padding: 12px 32px;
    border-bottom: 1px solid var(--border);
    overflow-x: auto; background: var(--bg);
    position: sticky; top: 90px; z-index: 99;
  }
  .cat-btn {
    padding: 6px 14px; border-radius: 20px;
    border: 1px solid var(--border); background: var(--card);
    color: var(--text-dim); font-size: 12px; font-weight: 700;
    cursor: pointer; white-space: nowrap; transition: all .15s;
  }
  .cat-btn:hover { border-color: var(--accent); color: var(--text); }
  .cat-btn.active { background: var(--accent); border-color: var(--accent); color: white; }
  /* ── Grid ── */
  .gallery { padding: 24px 32px; }
  .section-title {
    font-size: 16px; font-weight: 800; color: var(--text);
    margin: 24px 0 12px; padding-bottom: 8px;
    border-bottom: 2px solid var(--border);
    text-transform: uppercase; letter-spacing: 1px;
  }
  .section-title span { color: var(--accent); font-weight: 400; font-size: 13px; margin-left: 8px; text-transform: none; letter-spacing: 0; }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
    gap: 12px;
  }
  .icon-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px 8px 10px;
    display: flex; flex-direction: column; align-items: center;
    gap: 8px; cursor: pointer; transition: all .15s;
    position: relative;
  }
  .icon-card:hover { background: var(--card-hover); border-color: var(--accent); transform: translateY(-2px); }
  .icon-card svg { flex-shrink: 0; }
  .icon-name {
    font-size: 10px; color: var(--text-dim);
    text-align: center; word-break: break-all;
    line-height: 1.3; max-width: 100%;
  }
  .copied {
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    background: var(--success); color: white;
    padding: 4px 12px; border-radius: 6px;
    font-size: 12px; font-weight: 700;
    pointer-events: none; animation: fadeOut 1s forwards;
  }
  @keyframes fadeOut { 0%{opacity:1} 70%{opacity:1} 100%{opacity:0} }
  /* ── Toast ── */
  .toast {
    position: fixed; bottom: 24px; right: 24px;
    background: var(--accent); color: white;
    padding: 10px 20px; border-radius: 10px;
    font-size: 13px; font-weight: 700;
    opacity: 0; transition: opacity .3s;
    z-index: 200;
  }
  .toast.show { opacity: 1; }
</style>
</head>
<body>

<div class="header">
  <h1><span>MechReady</span> SVG Icon Library</h1>
  <div class="header-row">
    <input class="search" type="text" placeholder="Search icons..." id="search">
    <div class="size-control">
      <label>Size:</label>
      <input type="range" min="24" max="128" value="64" id="sizeSlider">
      <span id="sizeLabel">64px</span>
    </div>
    <div class="stats" id="stats"></div>
  </div>
</div>
<div class="cat-nav" id="catNav"></div>
<div class="gallery" id="gallery"></div>
<div class="toast" id="toast">Copied SVG!</div>

<script>
// ═══════════════════════════════════════════════════════════════
// MechReady SVG Icon Library — Duolingo-style Design Language
// ═══════════════════════════════════════════════════════════════

const MechIcons = (() => {

// ── Color Palette ──
const C = {
  green:    { base: '#58CC02', dark: '#3B8700', light: '#D0F0B0' },
  purple:   { base: '#CE82FF', dark: '#7B2FBE', light: '#F3E6FF' },
  red:      { base: '#FF4B4B', dark: '#CC3333', light: '#FFE0E0' },
  orange:   { base: '#FF9600', dark: '#CC6B00', light: '#FFF0D4' },
  blue:     { base: '#1CB0F6', dark: '#0F85BD', light: '#D6F0FF' },
  gold:     { base: '#FFD900', dark: '#CC9900', light: '#FFF8D4' },
  cyan:     { base: '#06B6D4', dark: '#0E7490', light: '#CFFAFE' },
  indigo:   { base: '#6366F1', dark: '#4338CA', light: '#E0E7FF' },
  amber:    { base: '#F59E0B', dark: '#B45309', light: '#FEF3C7' },
  steel:    { base: '#94A3B8', dark: '#64748B', light: '#E2E8F0' },
  pink:     { base: '#EC4899', dark: '#BE185D', light: '#FCE7F3' },
  teal:     { base: '#14B8A6', dark: '#0F766E', light: '#CCFBF1' },
  bronze:   { base: '#CD7F32', dark: '#8B5722', light: '#F0D4A8' },
  silver:   { base: '#C0C0C0', dark: '#808080', light: '#E8E8E8' },
  goldMetal:{ base: '#FFD700', dark: '#B8860B', light: '#FFF5CC' },
  platinum: { base: '#14B8A6', dark: '#0F766E', light: '#CCFBF1' },
  masters:  { base: '#A855F7', dark: '#6D28D9', light: '#EDE9FE' },
};

// tier color for levels
function levelColor(n) {
  if (n <= 5) return C.steel;
  if (n <= 10) return C.green;
  if (n <= 15) return C.blue;
  if (n <= 20) return C.purple;
  if (n <= 25) return C.gold;
  return C.red;
}

// ── Shared gradient defs ──
function defs(id, c) {
  return `<defs>
    <linearGradient id="${id}-fill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="${c.base}"/>
      <stop offset="100%" stop-color="${c.dark}"/>
    </linearGradient>
    <linearGradient id="${id}-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="${c.light}"/>
      <stop offset="100%" stop-color="${c.base}" stop-opacity="0.3"/>
    </linearGradient>
    <linearGradient id="${id}-shine" x1="0.2" y1="0" x2="0.8" y2="1">
      <stop offset="0%" stop-color="white" stop-opacity="0.4"/>
      <stop offset="50%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
  </defs>`;
}

// ── Base: Circle badge (topics) ──
function circleBase(id, c, symbol) {
  return `${defs(id, c)}
  <g data-part="base">
    <circle cx="32" cy="32" r="28" fill="url(#${id}-fill)" stroke="${c.dark}" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="32" cy="32" r="28" fill="url(#${id}-shine)"/>
  </g>
  <g data-part="body">${symbol}</g>
  <g data-part="highlight">
    <circle cx="20" cy="18" r="4" fill="white" opacity="0.15"/>
  </g>`;
}

// ── Base: Rounded square (quests/shop) ──
function squareBase(id, c, symbol) {
  return `${defs(id, c)}
  <g data-part="base">
    <rect x="4" y="4" width="56" height="56" rx="14" fill="url(#${id}-fill)" stroke="${c.dark}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="4" y="4" width="56" height="56" rx="14" fill="white" fill-opacity="0.06"/>
  </g>
  <g data-part="body">${symbol}</g>
  <g data-part="highlight">
    <circle cx="16" cy="14" r="3" fill="white" opacity="0.12"/>
  </g>`;
}

// ── Base: Shield (leagues) ──
function shieldBase(id, c, symbol) {
  return `<defs>
    <linearGradient id="${id}-body" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0%" stop-color="${c.base}"/>
      <stop offset="50%" stop-color="${c.dark}"/>
      <stop offset="100%" stop-color="${c.base}" stop-opacity="0.8"/>
    </linearGradient>
    <linearGradient id="${id}-shine" x1="0.2" y1="0" x2="0.8" y2="1">
      <stop offset="0%" stop-color="white" stop-opacity="0.35"/>
      <stop offset="50%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <g data-part="base">
    <path d="M32,4 L56,14 L56,34 Q56,50 32,60 Q8,50 8,34 L8,14Z" fill="url(#${id}-body)" stroke="${c.dark}" stroke-width="2.5" stroke-linejoin="round"/>
    <path d="M32,4 L56,14 L56,34 Q56,50 32,60 Q8,50 8,34 L8,14Z" fill="url(#${id}-shine)"/>
    <path d="M32,9 L51,17 L51,33 Q51,47 32,55 Q13,47 13,33 L13,17Z" fill="none" stroke="${c.base}" stroke-width="1" opacity="0.4" stroke-linejoin="round"/>
  </g>
  <g data-part="body">${symbol}</g>
  <g data-part="highlight">
    <ellipse cx="24" cy="18" rx="6" ry="4" fill="white" opacity="0.1"/>
  </g>`;
}

// ── Base: Medal (achievements) ──
function medalBase(id, c, symbol) {
  return `<defs>
    <linearGradient id="${id}-ring" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="${c.base}"/>
      <stop offset="100%" stop-color="${c.dark}"/>
    </linearGradient>
    <linearGradient id="${id}-inner" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="white"/>
      <stop offset="100%" stop-color="${c.light}"/>
    </linearGradient>
    <linearGradient id="${id}-ribbon" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="${c.base}"/>
      <stop offset="100%" stop-color="${c.dark}" stop-opacity="0.8"/>
    </linearGradient>
  </defs>
  <g data-part="base">
    <path d="M22,6 L18,18 L32,15 L46,18 L42,6" fill="url(#${id}-ribbon)" stroke="${c.dark}" stroke-width="1.5" stroke-linejoin="round"/>
    <circle cx="32" cy="36" r="22" fill="url(#${id}-ring)" stroke="${c.dark}" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="32" cy="36" r="18" fill="url(#${id}-inner)" stroke="${c.base}" stroke-width="1" opacity="0.6"/>
  </g>
  <g data-part="body">${symbol}</g>
  <g data-part="highlight">
    <circle cx="22" cy="24" r="3" fill="white" opacity="0.15"/>
  </g>`;
}

// ── Base: Level badge ──
function levelBase(id, c, n, symbol) {
  return `${defs(id, c)}
  <g data-part="base">
    <circle cx="32" cy="30" r="26" fill="url(#${id}-fill)" stroke="${c.dark}" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="32" cy="30" r="22" fill="${c.dark}" opacity="0.15"/>
    <circle cx="32" cy="30" r="26" fill="url(#${id}-shine)"/>
  </g>
  <g data-part="body">${symbol}</g>
  <g data-part="badge">
    <text x="32" y="59" text-anchor="middle" font-size="9" font-weight="bold" fill="${c.light}" font-family="system-ui,sans-serif">${n}</text>
  </g>
  <g data-part="highlight">
    <circle cx="20" cy="16" r="3" fill="white" opacity="0.12"/>
  </g>`;
}

// ── Base: Streak medal ──
function streakBase(id, c, num, symbol) {
  return `<defs>
    <linearGradient id="${id}-medal" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="${c.base}"/>
      <stop offset="100%" stop-color="${c.dark}"/>
    </linearGradient>
    <radialGradient id="${id}-flame" cx="0.5" cy="0.7" r="0.5">
      <stop offset="0%" stop-color="#FDE68A"/>
      <stop offset="50%" stop-color="${c.base}"/>
      <stop offset="100%" stop-color="${c.dark}"/>
    </radialGradient>
  </defs>
  <g data-part="base">
    <path d="M24,6 L20,16 L32,14 L44,16 L40,6" fill="${c.base}" stroke="${c.dark}" stroke-width="1.5" stroke-linejoin="round"/>
    <circle cx="32" cy="34" r="22" fill="url(#${id}-medal)" stroke="${c.dark}" stroke-width="2.5"/>
    <circle cx="32" cy="34" r="18" fill="none" stroke="${c.base}" stroke-width="1" opacity="0.4"/>
  </g>
  <g data-part="body">${symbol}</g>
  <g data-part="badge">
    <circle cx="48" cy="48" r="10" fill="${c.base}" stroke="${c.dark}" stroke-width="2"/>
    <circle cx="48" cy="48" r="7" fill="white" stroke="${c.dark}" stroke-width="0.5"/>
    <text x="48" y="52" text-anchor="middle" font-size="10" font-weight="bold" fill="${c.dark}" font-family="system-ui,sans-serif">${num}</text>
  </g>`;
}

// ── Base: Frame ring ──
function frameBase(id, c, decoration) {
  return `${defs(id, c)}
  <g data-part="base">
    <circle cx="32" cy="32" r="28" fill="none" stroke="url(#${id}-fill)" stroke-width="5" stroke-linecap="round"/>
  </g>
  <g data-part="body">${decoration}</g>`;
}

// ═══════════════════════════════════════════
// ICON DEFINITIONS
// ═══════════════════════════════════════════

const icons = {};

// ────────────────────────────

    <polygon points="46,21 43.5,17 48.5,17" fill="#FFD900"/>

}};

icons['topic-dynamics'] = { category: 'Topics', label: 'Dynamics', draw(id) {
  return circleBase(id, C.purple, `
    <rect x="8" y="20" width="4" height="24" rx="2" fill="white" opacity="0.85"/>
    <polyline points="12,28 17,25 22,31 27,25 32,31 37,25 40,28" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>

icons['topic-strength'] = { category: 'Topics', label: 'Strength of Materials', draw(id) {
  return circleBase(id, C.red, `

    <text x="32" y="50" text-anchor="middle" font-size="7" font-weight="bold" fill="white" opacity="0.8" font-family="system-ui">ε</text>

}};

icons['topic-thermo'] = { category: 'Topics', label: 'Thermodynamics', draw(id) {
  return circleBase(id, C.orange, `
    <path d="M32,14 Q26,22 24,30 Q22,38 32,44 Q42,38 40,30 Q38,22 32,14Z" fill="white" opacity="0.9" stroke="white" stroke-width="1.5" stroke-linejoin="round"/>

icons['topic-heat-transfer'] = { category: 'Topics', label: 'Heat Transfer', draw(id) {
  return circleBase(id, C.cyan, `

icons['topic-fluids'] = { category: 'Topics', label: 'Fluid Mechanics', draw(id) {

icons['topic-machine-elements'] = { category: 'Topics', label: 'Machine Elements', draw(id) {

icons['course-personal-finance'] = { category: 'Course', label: 'Personal Finance', draw(id) {
  return circleBase(id, C.green, `
    <rect x="18" y="24" width="18" height="12" rx="2" fill="white" opacity="0.7"/>
    <rect x="20" y="28" width="18" height="12" rx="2" fill="white" opacity="0.85"/>
    <circle cx="42" cy="36" r="8" fill="#FFD700" opacity="0.8" stroke="#B8860B" stroke-width="1.5"/>
    <text x="42" y="39.5" text-anchor="middle" font-size="8" font-weight="bold" fill="#B8860B" font-family="system-ui">$</text>
  `);
}};


// ═══════════════════════════════════════════
// PUBLIC API
// ═══════════════════════════════════════════

function render(name, size = 64) {
  const icon = icons[name];
  if (!icon) return `<svg width="${size}" height="${size}" viewBox="0 0 64 64"><text x="32" y="32" text-anchor="middle" font-size="8" fill="#888">?</text></svg>`;
  const id = name.replace(/[^a-z0-9]/g, '-');
  return `<svg xmlns="http://www.w3.org/2000/svg" width="${size}" height="${size}" viewBox="0 0 64 64" fill="none" stroke-linecap="round" stroke-linejoin="round">${icon.draw(id)}</svg>`;
}

function getAll() { return icons; }
function getCategory(cat) {
  return Object.fromEntries(Object.entries(icons).filter(([,v]) => v.category === cat));
}
function getCategories() {
  return [...new Set(Object.values(icons).map(i => i.category))];
}

return { render, getAll, getCategory, getCategories, icons, colors: C };

})(); // end MechIcons IIFE


// ═══════════════════════════════════════════
// GALLERY UI
// ═══════════════════════════════════════════

(function() {
  const gallery = document.getElementById('gallery');
  const search = document.getElementById('search');
  const sizeSlider = document.getElementById('sizeSlider');
  const sizeLabel = document.getElementById('sizeLabel');
  const catNav = document.getElementById('catNav');
  const stats = document.getElementById('stats');
  const toast = document.getElementById('toast');

  let currentSize = 64;
  let currentCat = 'All';
  let searchQuery = '';

  // Category nav
  function buildCatNav() {
    const cats = ['All', ...MechIcons.getCategories()];
    catNav.innerHTML = cats.map(c =>
      `<button class="cat-btn ${c === currentCat ? 'active' : ''}" data-cat="${c}">${c} ${c === 'All' ? `(${Object.keys(MechIcons.getAll()).length})` : `(${Object.keys(MechIcons.getCategory(c)).length})`}</button>`
    ).join('');
    catNav.querySelectorAll('.cat-btn').forEach(btn => {
      btn.onclick = () => { currentCat = btn.dataset.cat; buildCatNav(); renderGallery(); };
    });
  }

  function renderGallery() {
    const all = MechIcons.getAll();
    const cats = MechIcons.getCategories();
    let html = '';
    let total = 0;

    cats.forEach(cat => {
      if (currentCat !== 'All' && currentCat !== cat) return;
      const entries = Object.entries(all).filter(([k, v]) => {
        if (v.category !== cat) return false;
        if (searchQuery && !k.includes(searchQuery) && !v.label.toLowerCase().includes(searchQuery)) return false;
        return true;
      });
      if (entries.length === 0) return;
      total += entries.length;

      html += `<div class="section-title">${cat} <span>${entries.length} icons</span></div>`;
      html += `<div class="grid">`;
      entries.forEach(([key, icon]) => {
        html += `<div class="icon-card" data-key="${key}" title="${key}">
          ${MechIcons.render(key, currentSize)}
          <div class="icon-name">${key}</div>
        </div>`;
      });
      html += `</div>`;
    });

    gallery.innerHTML = html;
    stats.textContent = `${total} icons shown`;

    // Click to copy
    gallery.querySelectorAll('.icon-card').forEach(card => {
      card.onclick = () => {
        const key = card.dataset.key;
        const svg = MechIcons.render(key, 64);
        navigator.clipboard.writeText(svg).then(() => {
          const el = document.createElement('div');
          el.className = 'copied';
          el.textContent = 'Copied!';
          card.appendChild(el);
          setTimeout(() => el.remove(), 1000);
        });
      };
    });
  }

  // Size slider
  sizeSlider.oninput = () => {
    currentSize = parseInt(sizeSlider.value);
    sizeLabel.textContent = currentSize + 'px';
    renderGallery();
  };

  // Search
  search.oninput = () => {
    searchQuery = search.value.toLowerCase().trim();
    renderGallery();
  };

  buildCatNav();
  renderGallery();
})();
</script>
</body>
</html>
