<!DOCTYPE html>

<style>
  body {

    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 20px;
    gap: 40px;
  }
  h1 { color: #4B4B4B; font-size: 28px; font-weight: 800; }

  .sizes { display: flex; gap: 24px; align-items: end; flex-wrap: wrap; justify-content: center; }
