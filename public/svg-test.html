<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Duolingo-Style SVG Test</title>
<style>
  body {
    margin: 0;
    background: #F7F7F7;
    font-family: 'Nunito', system-ui, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 60px 20px;
    gap: 48px;
  }
  h1 { color: #4B4B4B; font-size: 24px; font-weight: 800; }
  .row { display: flex; gap: 48px; flex-wrap: wrap; justify-content: center; align-items: end; }
  .item { text-align: center; }
  .item p { color: #777; font-size: 13px; font-weight: 700; margin-top: 8px; }
</style>
</head>
<body>

<h1>duolingo-style svg — no outlines, pure flat shapes</h1>

<div class="row">

<!-- MECH ROBOT — 256px showcase -->
<div class="item">
<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 64 64" fill="none">
  <!-- Shadow (pill below feet) -->
  <rect x="18" y="57" width="28" height="5" rx="2.5" fill="#4B4B4B" opacity="0.1"/>

  <!-- Left arm -->
  <rect x="6" y="32" width="14" height="7" rx="3.5" fill="#0F85BD"/>
  <!-- Left hand -->
  <circle cx="8" cy="35.5" r="4.5" fill="#0F85BD"/>
  <!-- Wrench in left hand -->
  <rect x="2" y="27" width="4" height="12" rx="2" fill="#E7A601"/>
  <circle cx="4" cy="25" r="3.5" fill="#E7A601"/>
  <circle cx="4" cy="25" r="1.5" fill="#CD7900"/>

  <!-- Right arm -->
  <rect x="44" y="32" width="14" height="7" rx="3.5" fill="#0F85BD"/>
  <!-- Right hand -->
  <circle cx="56" cy="35.5" r="4.5" fill="#0F85BD"/>

  <!-- Left foot -->
  <rect x="20" y="51" width="9" height="7" rx="3.5" fill="#1899D6"/>
  <!-- Right foot -->
  <rect x="35" y="51" width="9" height="7" rx="3.5" fill="#1899D6"/>

  <!-- Body -->
  <rect x="16" y="28" width="32" height="26" rx="10" fill="#1CB0F6"/>
  <!-- Belly panel -->
  <rect x="22" y="34" width="20" height="14" rx="6" fill="#84D8FF"/>
  <!-- Belly bolt -->
  <circle cx="32" cy="41" r="2.5" fill="#1899D6"/>
  <circle cx="32" cy="41" r="1" fill="#84D8FF"/>

  <!-- Head -->
  <rect x="12" y="2" width="40" height="30" rx="12" fill="#1CB0F6"/>
  <!-- Face panel -->
  <rect x="18" y="8" width="28" height="18" rx="8" fill="#84D8FF"/>

  <!-- Antenna stick -->
  <rect x="30.5" y="-2" width="3" height="6" rx="1.5" fill="#1899D6"/>
  <!-- Antenna bulb -->
  <circle cx="32" cy="-2" r="4" fill="#FFC800"/>
  <circle cx="33" cy="-3" r="1.5" fill="#FFF5D3"/>

  <!-- Ear bolt left -->
  <circle cx="12" cy="17" r="3.5" fill="#1899D6"/>
  <circle cx="12" cy="17" r="1.5" fill="#84D8FF"/>
  <!-- Ear bolt right -->
  <circle cx="52" cy="17" r="3.5" fill="#1899D6"/>
  <circle cx="52" cy="17" r="1.5" fill="#84D8FF"/>

  <!-- Left eye (pill) -->
  <rect x="22" y="12" width="7" height="10" rx="3.5" fill="#F7F7F7"/>
  <!-- Left pupil (offset right+down for personality) -->
  <circle cx="26.5" cy="18" r="2.5" fill="#4B4B4B"/>
  <!-- Left eye shine -->
  <circle cx="27.5" cy="16.5" r="1" fill="#F7F7F7"/>

  <!-- Right eye (pill) -->
  <rect x="35" y="12" width="7" height="10" rx="3.5" fill="#F7F7F7"/>
  <!-- Right pupil -->
  <circle cx="39.5" cy="18" r="2.5" fill="#4B4B4B"/>
  <!-- Right eye shine -->
  <circle cx="40.5" cy="16.5" r="1" fill="#F7F7F7"/>

  <!-- Mouth (asymmetric, favors right — Duolingo style) -->
  <path d="M29,24 Q32.5,27.5 37,24" fill="none" stroke="#4B4B4B" stroke-width="1.8" stroke-linecap="round"/>

  <!-- Highlight (subtle white glow on head) -->
  <circle cx="20" cy="10" r="4" fill="white" opacity="0.15"/>
</svg>
<p>mech robot — 256px</p>
</div>

<!-- GEAR BUDDY — 256px -->
<div class="item">
<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 64 64" fill="none">
  <!-- Shadow -->
  <rect x="16" y="57" width="32" height="5" rx="2.5" fill="#4B4B4B" opacity="0.1"/>

  <!-- Feet -->
  <rect x="21" y="51" width="9" height="7" rx="3.5" fill="#58A700"/>
  <rect x="34" y="51" width="9" height="7" rx="3.5" fill="#58A700"/>

  <!-- Gear teeth (rounded rects around the circle) -->
  <rect x="28" y="5" width="8" height="9" rx="4" fill="#58CC02"/>
  <rect x="28" y="46" width="8" height="9" rx="4" fill="#58CC02"/>
  <rect x="7" y="26" width="9" height="8" rx="4" fill="#58CC02"/>
  <rect x="48" y="26" width="9" height="8" rx="4" fill="#58CC02"/>
  <rect x="12" y="12" width="8" height="7" rx="3.5" fill="#58CC02" transform="rotate(45 16 15.5)"/>
  <rect x="44" y="12" width="8" height="7" rx="3.5" fill="#58CC02" transform="rotate(-45 48 15.5)"/>
  <rect x="12" y="41" width="8" height="7" rx="3.5" fill="#58CC02" transform="rotate(-45 16 44.5)"/>
  <rect x="44" y="41" width="8" height="7" rx="3.5" fill="#58CC02" transform="rotate(45 48 44.5)"/>

  <!-- Body circle -->
  <circle cx="32" cy="30" r="20" fill="#58CC02"/>
  <!-- Face (lighter inner circle) -->
  <circle cx="32" cy="30" r="14" fill="#A5ED6E"/>
  <!-- Hub ring -->
  <circle cx="32" cy="30" r="5" fill="#58CC02"/>
  <circle cx="32" cy="30" r="2.5" fill="#89E219"/>

  <!-- Left eye -->
  <rect x="24" y="24" width="6" height="8" rx="3" fill="#F7F7F7"/>
  <circle cx="28" cy="29" r="2.2" fill="#4B4B4B"/>
  <circle cx="28.8" cy="27.8" r="0.9" fill="#F7F7F7"/>

  <!-- Right eye -->
  <rect x="34" y="24" width="6" height="8" rx="3" fill="#F7F7F7"/>
  <circle cx="38" cy="29" r="2.2" fill="#4B4B4B"/>
  <circle cx="38.8" cy="27.8" r="0.9" fill="#F7F7F7"/>

  <!-- Mouth -->
  <path d="M30,36 Q33,39 37,35.5" fill="none" stroke="#4B4B4B" stroke-width="1.8" stroke-linecap="round"/>

  <!-- Cheek blush -->
  <circle cx="22" cy="34" r="2.5" fill="#58CC02" opacity="0.5"/>
  <circle cx="42" cy="34" r="2.5" fill="#58CC02" opacity="0.5"/>

  <!-- Highlight -->
  <circle cx="22" cy="18" r="4" fill="white" opacity="0.12"/>
</svg>
<p>gear buddy — 256px</p>
</div>

<!-- FLAME BUDDY — 256px -->
<div class="item">
<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 64 64" fill="none">
  <!-- Shadow -->
  <rect x="18" y="57" width="28" height="5" rx="2.5" fill="#4B4B4B" opacity="0.1"/>

  <!-- Outer flame -->
  <path d="M32,2 Q16,20 14,32 Q12,48 32,58 Q52,48 50,32 Q48,20 32,2Z" fill="#FF9600"/>

  <!-- Middle flame -->
  <path d="M32,14 Q22,26 20,34 Q18,46 32,52 Q46,46 44,34 Q42,26 32,14Z" fill="#FFC800"/>

  <!-- Inner flame (lightest) -->
  <path d="M32,26 Q28,34 26,38 Q24,46 32,48 Q40,46 38,38 Q36,34 32,26Z" fill="#FFF5D3"/>

  <!-- Left eye -->
  <rect x="24" y="30" width="6" height="8" rx="3" fill="#F7F7F7"/>
  <circle cx="28" cy="35" r="2.2" fill="#4B4B4B"/>
  <circle cx="28.8" cy="33.8" r="0.9" fill="#F7F7F7"/>

  <!-- Right eye -->
  <rect x="34" y="30" width="6" height="8" rx="3" fill="#F7F7F7"/>
  <circle cx="38" cy="35" r="2.2" fill="#4B4B4B"/>
  <circle cx="38.8" cy="33.8" r="0.9" fill="#F7F7F7"/>

  <!-- Mouth -->
  <path d="M30,41 Q33.5,44 37,41" fill="none" stroke="#4B4B4B" stroke-width="1.8" stroke-linecap="round"/>

  <!-- Cheek blush -->
  <circle cx="22" cy="39" r="3" fill="#FF4B4B" opacity="0.2"/>
  <circle cx="42" cy="39" r="3" fill="#FF4B4B" opacity="0.2"/>

  <!-- Highlight -->
  <circle cx="22" cy="12" r="4" fill="white" opacity="0.15"/>
  <circle cx="38" cy="8" r="2" fill="white" opacity="0.1"/>
</svg>
<p>flame buddy — 256px</p>
</div>

</div>
