<title>Duolingo-Style SVG — v3 Improved</title>
<style>
  body {
    margin: 0;
    background: #F7F7F7;
    font-family: 'Nunito', system-ui, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 60px 20px;
    gap: 48px;
  }
  h1 { color: #4B4B4B; font-size: 24px; font-weight: 800; }
  h2 { color: #777; font-size: 16px; font-weight: 700; margin-top: 24px; }
  .row { display: flex; gap: 56px; flex-wrap: wrap; justify-content: center; align-items: end; }
  .item { text-align: center; }
  .item p { color: #777; font-size: 13px; font-weight: 700; margin-top: 8px; }
  .sizes { display: flex; gap: 32px; align-items: end; flex-wrap: wrap; justify-content: center; }
</style>
</head>

<h1>duolingo-style v3 — bigger heads, floating feet, more personality</h1>

<div class="row">

<!-- ═══════════════════════════════════════════ -->
<!-- MECH ROBOT v3 — 280px -->
<!-- Improvements: bigger head (50% of height), -->
<!-- floating feet (gap from body), asymmetric  -->
<!-- pose (right arm waving), wrench is bigger, -->
<!-- rounder proportions, wing-overlay on head   -->
<!-- ═══════════════════════════════════════════ -->
<div class="item">
<svg xmlns="http://www.w3.org/2000/svg" width="280" height="280" viewBox="0 0 64 64" fill="none">
  <!-- Shadow (pill — sits below floating feet) -->
  <rect x="16" y="59" width="32" height="4" rx="2" fill="#4B4B4B" opacity="0.12"/>

  <!-- === BACK ELEMENTS (behind body) === -->

  <!-- Left arm — reaching down, holding wrench -->
  <rect x="4" y="36" width="13" height="6.5" rx="3.25" fill="#1899D6"/>
  <circle cx="6" cy="39.25" r="4" fill="#1899D6"/>
  <!-- Wrench -->
  <rect x="0" y="30" width="5" height="14" rx="2.5" fill="#FFC800"/>
  <circle cx="2.5" cy="28" r="4" fill="#FFC800"/>
  <circle cx="2.5" cy="28" r="2" fill="#E7A601"/>

  <!-- Right arm — waving up! (personality) -->
  <rect x="47" y="30" width="13" height="6.5" rx="3.25" fill="#1899D6" transform="rotate(-25 53.5 33.25)"/>
  <circle cx="58" cy="28" r="4" fill="#1899D6"/>

  <!-- Floating feet (gap between body and feet = Duo style) -->
  <rect x="20" y="54" width="9" height="7" rx="4" fill="#1899D6"/>
  <rect x="35" y="54" width="9" height="7" rx="4" fill="#1899D6"/>

  <!-- === BODY === -->
  <rect x="17" y="32" width="30" height="20" rx="10" fill="#1CB0F6"/>
  <!-- Belly panel -->
  <rect x="23" y="37" width="18" height="11" rx="5.5" fill="#84D8FF"/>
  <!-- Belly bolt -->
  <circle cx="32" cy="42.5" r="2.5" fill="#1899D6"/>
  <circle cx="32" cy="42.5" r="1" fill="#DDF4FF"/>

  <!-- === HEAD (BIG — 50% of character height) === -->
  <rect x="10" y="1" width="44" height="34" rx="14" fill="#1CB0F6"/>

  <!-- Wing overlay (darker patch on side of head — Duo has this) -->
  <rect x="10" y="10" width="10" height="16" rx="5" fill="#1899D6" opacity="0.35"/>

  <!-- Face panel (lighter) -->
  <rect x="17" y="7" width="30" height="22" rx="9" fill="#84D8FF"/>

  <!-- Antenna -->
  <rect x="30.5" y="-4" width="3" height="7" rx="1.5" fill="#1899D6"/>
  <circle cx="32" cy="-5" r="4.5" fill="#FFC800"/>
  <circle cx="33.5" cy="-6.5" r="1.8" fill="#FFF5D3"/>

  <!-- Ear bolts -->
  <circle cx="10" cy="18" r="4" fill="#1899D6"/>
  <circle cx="10" cy="18" r="1.8" fill="#DDF4FF"/>
  <circle cx="54" cy="18" r="4" fill="#1899D6"/>
  <circle cx="54" cy="18" r="1.8" fill="#DDF4FF"/>

  <!-- === FACE === -->

  <!-- Left eye (big pill) -->
  <rect x="20" y="11" width="9" height="13" rx="4.5" fill="#F7F7F7"/>
  <!-- Pupil — looking slightly right and down -->
  <circle cx="26" cy="19" r="3" fill="#4B4B4B"/>
  <!-- Eye shine (two dots — Duo style) -->
  <circle cx="27.2" cy="17" r="1.3" fill="#F7F7F7"/>
  <circle cx="25.5" cy="15.5" r="0.6" fill="#F7F7F7"/>

  <!-- Right eye (big pill) -->
  <rect x="35" y="11" width="9" height="13" rx="4.5" fill="#F7F7F7"/>
  <circle cx="41" cy="19" r="3" fill="#4B4B4B"/>
  <circle cx="42.2" cy="17" r="1.3" fill="#F7F7F7"/>
  <circle cx="40.5" cy="15.5" r="0.6" fill="#F7F7F7"/>

  <!-- Mouth — asymmetric, happy, slightly open -->
  <path d="M28.5,26 Q32,30 37,26.5" fill="#1899D6" opacity="0.6"/>
  <path d="M29,26 Q32,29.5 36.5,26" fill="none" stroke="#4B4B4B" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Cheek blush -->
  <circle cx="19" cy="23" r="2.5" fill="#1899D6" opacity="0.3"/>
  <circle cx="45" cy="23" r="2.5" fill="#1899D6" opacity="0.3"/>

  <!-- Highlights -->
  <circle cx="18" cy="8" r="4.5" fill="white" opacity="0.12"/>
  <circle cx="26" cy="5" r="2" fill="white" opacity="0.08"/>
</svg>
<p>mech robot v3</p>
</div>

<!-- GEAR BUDDY v3 — 280px -->
<!-- Improvements: face takes more space, little -->
<!-- arms waving, better tooth proportions,      -->
<!-- eyebrows for expression, tongue peeking out -->
<!-- ═══════════════════════════════════════════ -->

<svg xmlns="http://www.w3.org/2000/svg" width="280" height="280" viewBox="0 0 64 64" fill="none">

  <rect x="16" y="59" width="32" height="4" rx="2" fill="#4B4B4B" opacity="0.12"/>

  <!-- Floating feet -->

  <circle cx="4" cy="30.75" r="3.5" fill="#58A700"/>
  <rect x="51" y="24" width="11" height="5.5" rx="2.75" fill="#58A700" transform="rotate(-20 56.5 26.75)"/>
  <circle cx="60" cy="23" r="3.5" fill="#58A700"/>

  <!-- Gear teeth (8 around, overlapping with body circle) -->
  <rect x="28" y="2" width="8" height="10" rx="4" fill="#58CC02"/>
  <rect x="28" y="44" width="8" height="10" rx="4" fill="#58CC02"/>
  <rect x="4" y="24" width="10" height="8" rx="4" fill="#58CC02"/>
  <rect x="50" y="24" width="10" height="8" rx="4" fill="#58CC02"/>
  <rect x="10" y="9" width="9" height="7" rx="3.5" fill="#58CC02" transform="rotate(45 14.5 12.5)"/>
  <rect x="45" y="9" width="9" height="7" rx="3.5" fill="#58CC02" transform="rotate(-45 49.5 12.5)"/>
  <rect x="10" y="40" width="9" height="7" rx="3.5" fill="#58CC02" transform="rotate(-45 14.5 43.5)"/>
  <rect x="45" y="40" width="9" height="7" rx="3.5" fill="#58CC02" transform="rotate(45 49.5 43.5)"/>

  <!-- Body (main circle) -->
  <circle cx="32" cy="28" r="22" fill="#58CC02"/>

  <!-- Wing overlay (darker patch — adds dimension without outline) -->
  <circle cx="18" cy="22" r="10" fill="#43C000" opacity="0.3"/>

  <!-- Face (lighter inner) -->
  <circle cx="32" cy="28" r="16" fill="#A5ED6E"/>

  <!-- Hub center -->
  <circle cx="32" cy="28" r="4.5" fill="#58CC02"/>
  <circle cx="32" cy="28" r="2" fill="#89E219"/>

  <!-- Left eye -->
  <rect x="22" y="20" width="8" height="11" rx="4" fill="#F7F7F7"/>
  <circle cx="27.5" cy="27" r="3" fill="#4B4B4B"/>
  <circle cx="28.8" cy="25" r="1.3" fill="#F7F7F7"/>
  <circle cx="27" cy="23.5" r="0.6" fill="#F7F7F7"/>
  <!-- Left eyebrow -->
  <rect x="22.5" y="18" width="7" height="2.5" rx="1.25" fill="#58A700" opacity="0.6"/>

  <!-- Right eye -->
  <rect x="34" y="20" width="8" height="11" rx="4" fill="#F7F7F7"/>
  <circle cx="39.5" cy="27" r="3" fill="#4B4B4B"/>
  <circle cx="40.8" cy="25" r="1.3" fill="#F7F7F7"/>
  <circle cx="39" cy="23.5" r="0.6" fill="#F7F7F7"/>
  <!-- Right eyebrow (slightly raised — personality!) -->
  <rect x="34.5" y="17" width="7" height="2.5" rx="1.25" fill="#58A700" opacity="0.6" transform="rotate(-5 38 18.25)"/>

  <!-- Mouth — big happy grin with tongue -->
  <path d="M27,34 Q32,39 38,34" fill="#58A700"/>
  <path d="M30,35.5 Q32,38 34,35.5" fill="#FFAADE" opacity="0.7"/>

  <!-- Cheek blush -->
  <circle cx="20" cy="32" r="3" fill="#58CC02" opacity="0.4"/>
  <circle cx="44" cy="32" r="3" fill="#58CC02" opacity="0.4"/>

  <!-- Highlights -->
  <circle cx="20" cy="14" r="5" fill="white" opacity="0.1"/>
</svg>
<p>gear buddy v3</p>

<!-- FLAME BUDDY v3 — 280px -->
<!-- Improvements: bigger eyes, tiny arms,       -->
<!-- flame tip flickers, better face position,   -->
<!-- more dynamic flame shape, eyebrows          -->
<!-- ═══════════════════════════════════════════ -->
<div class="item">
<svg xmlns="http://www.w3.org/2000/svg" width="280" height="280" viewBox="0 0 64 64" fill="none">
  <!-- Shadow -->
  <rect x="18" y="59" width="28" height="4" rx="2" fill="#4B4B4B" opacity="0.12"/>

  <!-- Tiny arms (sticking out of flame sides) -->
  <circle cx="13" cy="38" r="3.5" fill="#E7A601"/>
  <circle cx="51" cy="38" r="3.5" fill="#E7A601"/>

  <!-- Outer flame (with flicker tip) -->

  <!-- Middle flame -->

  <!-- Inner glow -->
  <path d="M32,24 Q26,34 24,40 Q22,48 32,52 Q42,48 40,40 Q38,34 32,24Z" fill="#FBE56D"/>

  <!-- Core (lightest) -->
  <path d="M32,34 Q29,40 28,43 Q27,48 32,50 Q37,48 36,43 Q35,40 32,34Z" fill="#FFF5D3"/>

  <!-- Wing overlay (darker patch on left side of flame) -->

  <!-- Left eye -->
  <rect x="23" y="30" width="7" height="10" rx="3.5" fill="#F7F7F7"/>
  <circle cx="27.5" cy="36" r="2.8" fill="#4B4B4B"/>
  <circle cx="28.6" cy="34.2" r="1.2" fill="#F7F7F7"/>
  <circle cx="27" cy="33" r="0.5" fill="#F7F7F7"/>
  <!-- Left eyebrow -->
  <rect x="23" y="28.5" width="6.5" height="2" rx="1" fill="#E7A601" opacity="0.7"/>

  <!-- Right eye -->
  <rect x="34" y="30" width="7" height="10" rx="3.5" fill="#F7F7F7"/>
  <circle cx="38.5" cy="36" r="2.8" fill="#4B4B4B"/>
  <circle cx="39.6" cy="34.2" r="1.2" fill="#F7F7F7"/>
  <circle cx="38" cy="33" r="0.5" fill="#F7F7F7"/>
  <!-- Right eyebrow (raised — excited!) -->
  <rect x="34.5" y="27.5" width="6.5" height="2" rx="1" fill="#E7A601" opacity="0.7" transform="rotate(-8 37.75 28.5)"/>

  <!-- Mouth — open happy, showing tongue -->
  <path d="M28,43 Q32,48 37,43.5" fill="#CC6B00"/>
  <path d="M30,44 Q32,46.5 34.5,44" fill="#FFAADE" opacity="0.7"/>

  <!-- Cheek blush -->
  <circle cx="21" cy="40" r="3" fill="#FF4B4B" opacity="0.18"/>
  <circle cx="43" cy="40" r="3" fill="#FF4B4B" opacity="0.18"/>

  <!-- Flame tip sparkles -->
  <circle cx="36" cy="4" r="1.5" fill="#FFF5D3" opacity="0.6"/>
  <circle cx="42" cy="10" r="1" fill="#FFF5D3" opacity="0.4"/>

  <!-- Highlight -->
  <circle cx="20" cy="14" r="5" fill="white" opacity="0.1"/>
  <circle cx="38" cy="6" r="2.5" fill="white" opacity="0.08"/>
</svg>
<p>flame buddy v3</p>
